<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Baliarda FINAL</title>

<style>
*{box-sizing:border-box;font-family:"Comic Sans MS",cursive}
body{margin:0;background:radial-gradient(circle,#0b1f3a,#000);color:#fff}

/* PANEL SUPERIOR */
.top-bar{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 30px;
}

.panel{
background:rgba(0,0,0,.5);
padding:12px;
border-radius:12px;
width:220px;
text-align:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.panel.ahora{
box-shadow:0 0 25px red;
}

.panel.rest{
box-shadow:0 0 25px #00ff88;
}

.value{
font-size:16px;
font-weight:bold;
}

/* BOTONES */
.controles{
margin-top:90px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.btn{
width:120px;
height:70px;
border-radius:16px;
background:#111;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
cursor:pointer;
box-shadow:0 0 10px rgba(255,255,255,0.08);
}

/* COLORES */
.btn.act0{background:#00ff88;box-shadow:0 0 25px #00ff88}
.btn.act1{background:#ffd000;box-shadow:0 0 25px #ffd000}
.btn.act2,.btn.act3,.btn.act4,.btn.act5,.btn.act6,.btn.act7{
background:#ff3c3c;
box-shadow:0 0 25px #ff3c3c;
}
.btn.act8{background:#00e5ff;box-shadow:0 0 25px #00e5ff}

/* DATELINE */
.dateline{
display:flex;
margin-top:20px;
padding:0 20px;
}

.col{
flex:1;
text-align:center;
font-size:12px;
}

.col .d{font-weight:bold}
.col .f{opacity:.7}

/* FILAS */
.fila{margin:10px 20px}

.horarios{
display:flex;
gap:10px;
}

.slot{
flex:1;
background:#111;
border-radius:10px;
padding:10px;
text-align:center;
opacity:0;
transition:.3s;
}

.slot.on{
opacity:1;
box-shadow:0 0 10px currentColor;
}

/* LINEAS */
.carril{
display:flex;
gap:10px;
margin-top:6px;
}

.seg{
flex:1;
height:6px;
background:#222;
transform:scaleX(0);
transform-origin:left;
transition:.3s;
}

.seg.on{
transform:scaleX(1);
background:currentColor;
}

/* LOGO */
.logo{
position:fixed;
bottom:10px;
right:20px;
text-align:center;
}

.logo h2{margin:0;text-shadow:0 0 10px #00aaff}
.logo .line{
height:2px;
width:120px;
background:#00aaff;
margin:5px auto;
box-shadow:0 0 10px #00aaff;
}
.logo p{font-size:10px;color:#ccc}
</style>
</head>

<body>

<!-- TOP -->
<div class="top-bar">
<div class="panel ahora">
<div>AHORA</div>
<div id="hora" class="value"></div>
</div>

<div class="panel rest">
<div>TIEMPO RESTANTE</div>
<div id="restante" class="value"></div>
</div>
</div>

<!-- BOTONES -->
<div class="controles" id="botones"></div>

<!-- DATELINE -->
<div class="dateline" id="dateline"></div>

<!-- ZONAS -->
<div id="zonas"></div>

<!-- LOGO -->
<div class="logo">
<h2>GVS PRODUCCIONES</h2>
<div class="line"></div>
<p>Interactive Experience • Eventos en Vivo</p>
</div>

<script>

/* DATOS */
const colores=[
"#00ff88","#ffd000","#ff3c3c","#ff3c3c",
"#ff3c3c","#ff3c3c","#ff3c3c","#ff3c3c","#00e5ff"
];

const botonesTxt=[
"1°","2°","Mejor 3","2° Mejor","3° Mejor",
"4° Mejor","5° Mejor","Peor 3","4°"
];

const data=[
["30/06 22:00","05/07 22:00","09/07 22:00","14/07 22:00"],
["29/06 22:00","04/07 22:00","08/07 22:00","13/07 22:00"],
["28/06 22:00","03/07 22:00","07/07 22:00","12/07 22:00"],
["28/06 19:00","03/07 19:00","07/07 19:00","12/07 19:00"],
["29/06 16:00","04/07 16:00","08/07 16:00","13/07 16:00"],
["29/06 13:00","04/07 13:00","08/07 13:00","13/07 13:00"],
["30/06 16:00","05/07 16:00","09/07 16:00","14/07 16:00"],
["30/06 13:00","05/07 13:00","09/07 13:00","14/07 13:00"],
["ELIMINADO","","",""]
];

const fechas=[
"16/06 - LUN","22/06 - DOM","27/06 - VIE",
"03/07 - JUE","07/07 - LUN","11/07 - VIE",
"15/07 - MAR","19/07 - SAB"
];

const fases=["GRUPOS","GRUPOS","GRUPOS","16°","8°","4°","SEMI","FINAL"];

let estados=new Array(9).fill(false);

/* BOTONES */
const botones=document.getElementById("botones");
botonesTxt.forEach((t,i)=>{
let b=document.createElement("div");
b.className="btn";
b.innerHTML=t;
b.onclick=()=>toggle(i,b);
botones.appendChild(b);
});

/* DATELINE */
const dl=document.getElementById("dateline");
fechas.forEach((f,i)=>{
let c=document.createElement("div");
c.className="col";
c.innerHTML=`<div class="d">${f}</div><div class="f">${fases[i]}</div>`;
dl.appendChild(c);
});

/* FILAS */
const zonas=document.getElementById("zonas");

data.forEach((fila,i)=>{
let cont=document.createElement("div");
cont.className="fila";

let h=document.createElement("div");
h.className="horarios";

fila.forEach(v=>{
let s=document.createElement("div");
s.className="slot";
s.innerHTML=v;
h.appendChild(s);
});

let c=document.createElement("div");
c.className="carril";

fila.forEach(()=>{
let seg=document.createElement("div");
seg.className="seg";
c.appendChild(seg);
});

cont.appendChild(h);
cont.appendChild(c);
zonas.appendChild(cont);
});

/* TOGGLE */
function toggle(i,btn){

estados[i]=!estados[i];
btn.classList.toggle("act"+i);

let fila=document.querySelectorAll(".fila")[i];
let slots=fila.querySelectorAll(".slot");
let segs=fila.querySelectorAll(".seg");

if(estados[i]){
slots.forEach((s,k)=>{
setTimeout(()=>{
s.classList.add("on");
s.style.color=colores[i];
segs[k].classList.add("on");
segs[k].style.background=colores[i];
},k*120);
});
}else{
slots.forEach((s,k)=>{
setTimeout(()=>{
s.classList.remove("on");
segs[k].classList.remove("on");
},k*120);
});
}
}

/* RELOJ */
setInterval(()=>{
let a=new Date();
hora.innerHTML=a.toLocaleDateString()+"<br>"+a.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

let target=new Date("2026-07-19");
let diff=target-a;

let d=Math.floor(diff/86400000);
let h=Math.floor(diff/3600000%24);
let m=Math.floor(diff/60000%60);

restante.innerHTML=d+" días<br>"+h+"h "+m+"m";

},1000);

</script>

</body>
</html>
