<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Baliarda FULL FINAL - Tooltips OK</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
*{box-sizing:border-box;font-family:"Comic Sans MS",cursive}
body{margin:0;background:radial-gradient(circle,#0b1f3a,#000);color:#fff}

/* LATIDO */
@keyframes pulse {
  0%{transform:scale(1)}
  50%{transform:scale(1.12)}
  100%{transform:scale(1)}
}

/* TOP */
.top-bar{position:absolute;top:10px;width:100%;display:flex;justify-content:space-between;padding:0 30px}

.panel{
  background:rgba(0,0,0,.5);
  padding:12px;
  border-radius:12px;
  width:220px;
  text-align:center;
}

.panel.ahora{box-shadow:0 0 30px rgba(255,0,0,.4)}
.panel.rest{box-shadow:0 0 30px rgba(0,255,100,.3)}

.value{
  font-size:16px;
  font-weight:bold;
  animation:pulse 1.2s infinite;
}

/* BOTONES */
.controles{margin-top:90px;display:flex;justify-content:center;gap:14px}

.btn{
  width:120px;height:80px;border-radius:18px;background:#111;
  display:flex;justify-content:center;align-items:center;text-align:center;cursor:pointer;
  transition:box-shadow .18s, transform .12s, background .12s;
  box-shadow:0 0 8px rgba(255,255,255,0.03);
}

/* COLORES BOTONES ACTIVOS */
.btn[data-id="0"].activo{background:#00ff88;box-shadow:0 0 30px rgba(0,255,136,0.35)}
.btn[data-id="1"].activo{background:#ffd000;box-shadow:0 0 30px rgba(255,208,0,0.35)}
.btn[data-id="2"].activo{background:#ff3c3c;box-shadow:0 0 30px rgba(255,60,60,0.35)}
.btn[data-id="3"].activo{background:#ff3c3c;box-shadow:0 0 30px rgba(255,60,60,0.35)}
.btn[data-id="4"].activo{background:#00e5ff;box-shadow:0 0 30px rgba(0,229,255,0.35)}

/* HEADER */
.header{margin-top:20px}
.row{display:flex}
.cell{flex:1;text-align:center;font-size:12px}

/* HORARIOS */
.horarios{
  display:flex;
  margin-top:10px;
  padding:0 20px;
.horarios span{
  flex:1;text-align:center;opacity:0;position:relative;padding:4px 2px;
}
.horarios span.activo{opacity:1;box-shadow:0 0 10px currentColor}

/* TOOLTIP */
.tooltip{
  position:absolute;bottom:120%;left:50%;
  transform:translateX(-50%) scale(0.85);
  opacity:0;pointer-events:none;
  background:rgba(0,0,0,.95);
  padding:10px;border-radius:10px;width:190px;text-align:center;
  transition:.18s;z-index:999;
  box-shadow:0 0 12px rgba(0,0,0,0.6);
}
.tooltip img{width:100%;border-radius:6px;margin-top:6px}
.horarios span:hover .tooltip{opacity:1;transform:translateX(-50%) scale(1);pointer-events:auto}

/* CARRIL */
.carril{
  display:flex;
  margin:10px 0;
  padding:0 20px;
.segmento{flex:1;height:6px;background:#222;border-radius:6px;transform:scaleX(0);transform-origin:left;transition:.3s}
.segmento.activo{transform:scaleX(1);background:currentColor}
.segmento.final{animation:pulse 1s infinite}

/* LOGO */
.logo{position:fixed;bottom:10px;right:20px;display:flex;flex-direction:column;align-items:center;text-align:center}
.logo h2{margin:0;text-shadow:0 0 10px #00aaff}
.logo .line{height:2px;width:70%;max-width:140px;background:#00aaff;box-shadow:0 0 10px #00aaff;margin-top:5px}
.logo p{font-size:10px;color:#ccc;margin-top:5px}
</style>
</head>
<body>

<div class="top-bar">
  <div class="panel ahora">
    <div>AHORA</div>
    <div id="hora" class="value"></div>
  </div>

  <div class="panel rest">
    <div>TIEMPO RESTANTE</div>
    <div id="restante" class="value"></div>
  </div>
</div>

<div class="controles">
  <div class="btn" data-id="0" onclick="toggle(0,this)">1°</div>
  <div class="btn" data-id="1" onclick="toggle(1,this)">2°</div>
  <div class="btn" data-id="2" onclick="toggle(2,this)">Mejor<br>3</div>
  <div class="btn" data-id="3" onclick="toggle(3,this)">Peor<br>3</div>
  <div class="btn" data-id="4" onclick="toggle(4,this)">4°</div>
</div>

<div class="header">
  <div class="row">
    <div class="cell">16/06 - LUN</div>
    <div class="cell">22/06 - DOM</div>
    <div class="cell">27/06 - VIE</div>
    <div class="cell">03/07 - JUE</div>
    <div class="cell">07/07 - LUN</div>
    <div class="cell">11/07 - VIE</div>
    <div class="cell">15/07 - MAR</div>
    <div class="cell">19/07 - SAB</div>
  </div>

  <div class="row">
    <div class="cell">Grupos</div>
    <div class="cell">Grupos</div>
    <div class="cell">Grupos</div>
    <div class="cell">16°</div>
    <div class="cell">8°</div>
    <div class="cell">4°</div>
    <div class="cell">Semi</div>
    <div class="cell">Final</div>
  </div>
</div>

<div id="zonas"></div>

<div class="logo">
  <h2>GVS PRODUCCIONES</h2>
  <div class="line"></div>
  <p>Interactive Experience • Eventos en Vivo</p>
</div>

<script>
/* Colores por fila (consistentes con botones) */
const colores = [
  "#00ff88", // 1°
  "#ffd000", // 2°
  "#ff3c3c", // Mejor 3 (rojo)
  "#ff3c3c", // Peor 3 (rojo)
  "#00e5ff"  // 4° (turquesa)
];

/* Datos de ejemplo para tooltips (5 filas x 8 columnas) */
const estadiosData = [
  [
    {nombre:"Lusail Stadium", ciudad:"Qatar", img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Lusail_Stadium.jpg"},
    {nombre:"MetLife Stadium", ciudad:"USA", img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/MetLife_Stadium.jpg"},
    {nombre:"Azteca Stadium", ciudad:"México", img:"https://upload.wikimedia.org/wikipedia/commons/1/16/Estadio_Azteca.jpg"},
    {nombre:"SoFi Stadium", ciudad:"Los Ángeles", img:"https://upload.wikimedia.org/wikipedia/commons/5/5c/SoFi_Stadium.jpg"},
    {nombre:"Hard Rock Stadium", ciudad:"Miami", img:"https://upload.wikimedia.org/wikipedia/commons/6/6c/Hard_Rock_Stadium.jpg"},
    {nombre:"AT&T Stadium", ciudad:"Dallas", img:"https://upload.wikimedia.org/wikipedia/commons/5/5a/ATT_Stadium.jpg"},
    {nombre:"Levi's Stadium", ciudad:"San Francisco", img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Levis_Stadium.jpg"},
    {nombre:"Mercedes-Benz Stadium", ciudad:"Atlanta", img:"https://upload.wikimedia.org/wikipedia/commons/5/5d/Mercedes-Benz_Stadium.jpg"}
  ],
  [
    {nombre:"BC Place", ciudad:"Vancouver", img:"https://upload.wikimedia.org/wikipedia/commons/0/0e/BC_Place.jpg"},
    {nombre:"BMO Field", ciudad:"Toronto", img:"https://upload.wikimedia.org/wikipedia/commons/5/5e/BMO_Field.jpg"},
    {nombre:"Gillette Stadium", ciudad:"Boston", img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Gillette_Stadium.jpg"},
    {nombre:"NRG Stadium", ciudad:"Houston", img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/NRG_Stadium.jpg"},
    {nombre:"Arrowhead Stadium", ciudad:"Kansas City", img:"https://upload.wikimedia.org/wikipedia/commons/2/2f/Arrowhead_Stadium.jpg"},
    {nombre:"Lincoln Financial Field", ciudad:"Philadelphia", img:"https://upload.wikimedia.org/wikipedia/commons/2/2e/Lincoln_Financial_Field.jpg"},
    {nombre:"Lumen Field", ciudad:"Seattle", img:"https://upload.wikimedia.org/wikipedia/commons/4/4e/Lumen_Field.jpg"},
    {nombre:"State Farm Stadium", ciudad:"Phoenix", img:"https://upload.wikimedia.org/wikipedia/commons/2/2b/State_Farm_Stadium.jpg"}
  ],
  [
    {nombre:"Estadio BBVA", ciudad:"Monterrey", img:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Estadio_BBVA.jpg"},
    {nombre:"Estadio Akron", ciudad:"Guadalajara", img:"https://upload.wikimedia.org/wikipedia/commons/1/1c/Estadio_Akron.jpg"},
    {nombre:"Rose Bowl", ciudad:"Los Ángeles", img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Rose_Bowl.jpg"},
    {nombre:"Soldier Field", ciudad:"Chicago", img:"https://upload.wikimedia.org/wikipedia/commons/7/7c/Soldier_Field.jpg"},
    {nombre:"FedEx Field", ciudad:"Washington", img:"https://upload.wikimedia.org/wikipedia/commons/0/0d/FedExField.jpg"},
    {nombre:"Empower Field", ciudad:"Denver", img:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Empower_Field.jpg"},
    {nombre:"Allegiant Stadium", ciudad:"Las Vegas", img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Allegiant_Stadium.jpg"},
    {nombre:"Bank of America Stadium", ciudad:"Charlotte", img:"https://upload.wikimedia.org/wikipedia/commons/2/2f/Bank_of_America_Stadium.jpg"}
  ],
  [
    {nombre:"TQL Stadium", ciudad:"Cincinnati", img:"https://upload.wikimedia.org/wikipedia/commons/2/2c/TQL_Stadium.jpg"},
    {nombre:"Children’s Mercy Park", ciudad:"Kansas", img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Childrens_Mercy_Park.jpg"},
    {nombre:"Exploria Stadium", ciudad:"Orlando", img:"https://upload.wikimedia.org/wikipedia/commons/2/2c/Exploria_Stadium.jpg"},
    {nombre:"DRV PNK Stadium", ciudad:"Miami", img:"https://upload.wikimedia.org/wikipedia/commons/5/5c/DRV_PNK_Stadium.jpg"},
    {nombre:"Audi Field", ciudad:"Washington", img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Audi_Field.jpg"},
    {nombre:"Red Bull Arena", ciudad:"New York", img:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Red_Bull_Arena.jpg"},
    {nombre:"Dignity Health Sports Park", ciudad:"LA", img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Dignity_Health_Sports_Park.jpg"},
    {nombre:"Subaru Park", ciudad:"Philadelphia", img:"https://upload.wikimedia.org/wikipedia/commons/2/2f/Subaru_Park.jpg"}
  ],
  [
    {nombre:"Toyota Stadium", ciudad:"Dallas", img:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Toyota_Stadium.jpg"},
    {nombre:"Geodis Park", ciudad:"Nashville", img:"https://upload.wikimedia.org/wikipedia/commons/4/4d/Geodis_Park.jpg"},
    {nombre:"Q2 Stadium", ciudad:"Austin", img:"https://upload.wikimedia.org/wikipedia/commons/5/5d/Q2_Stadium.jpg"},
    {nombre:"PayPal Park", ciudad:"San Jose", img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/PayPal_Park.jpg"},
    {nombre:"Snapdragon Stadium", ciudad:"San Diego", img:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Snapdragon_Stadium.jpg"},
    {nombre:"Allianz Field", ciudad:"Minnesota", img:"https://upload.wikimedia.org/wikipedia/commons/5/5a/Allianz_Field.jpg"},
    {nombre:"Providence Park", ciudad:"Portland", img:"https://upload.wikimedia.org/wikipedia/commons/2/2f/Providence_Park.jpg"},
    {nombre:"Lower.com Field", ciudad:"Columbus", img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Lower.com_Field.jpg"}
  ]
];

const horarios = [
  ["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"],
  ["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"],
  ["22:00","14:00","23:00","","","","",""],
  ["22:00","14:00","23:00","","","","",""],
  ["22:00","14:00","23:00","","","","",""]
];

const estados=[false,false,false,false,false];

function init(){
  const zonas=document.getElementById("zonas");
  zonas.innerHTML = '';
  horarios.forEach((fila,i)=>{
    const h=document.createElement("div"); h.className="horarios";
    fila.forEach((v,j)=>{
      const sp=document.createElement("span");
      if(v){
        sp.innerText = v;

        // crear tooltip con glow del color de la fila
        const data = estadiosData[i] && estadiosData[i][j];
        if(data){
          const tooltip=document.createElement("div");
          tooltip.className="tooltip";
          tooltip.style.boxShadow = `0 0 18px ${colores[i] || '#fff'}`;
          tooltip.innerHTML = `<b style="display:block;margin-bottom:6px">${data.nombre}</b>
                               <img src="${data.img}" alt="${data.nombre}">
                               <div style="font-size:11px;margin-top:6px">${data.ciudad}</div>`;
          sp.appendChild(tooltip);
        }
      }
      h.appendChild(sp);
    });

    const c=document.createElement("div"); c.className="carril";
    fila.forEach(()=>{ const s=document.createElement("div"); s.className="segmento"; c.appendChild(s); });

    zonas.appendChild(h); zonas.appendChild(c);
  });
}
init();

/* TOGGLE funcional */
function toggle(i, btn){
  // mantener data-id en el botón
  if(btn && !btn.hasAttribute('data-id')) btn.setAttribute('data-id', String(i));

  estados[i] = !estados[i];

  // actualizamos estado visual del botón seleccionado
  document.querySelectorAll('.controles .btn').forEach(b=>{
    if(b.getAttribute('data-id') === String(i)){
      b.classList.toggle('activo');
    }
  });

  const filas = document.querySelectorAll('.horarios')[i];
  const carril = document.querySelectorAll('.carril')[i];
  const spans = filas ? filas.children : [];
  const segs = carril ? carril.children : [];

  let lastValid = -1;
  for(let k=0;k<spans.length;k++){
    if(spans[k].innerHTML.trim() !== "") lastValid = k;
  }

  if(estados[i]){
    for(let s=0; s<=lastValid; s++){
      ((si)=>{
        setTimeout(()=>{
          if(spans[si].innerHTML.trim() !== ""){
            segs[si].classList.add('activo');
            segs[si].style.color = colores[i];
            spans[si].classList.add('activo');
            spans[si].style.color = colores[i];
          }
        }, si * 140);
      })(s);
    }
    if(lastValid >= 0 && i !== 4){
      setTimeout(()=>{ segs[lastValid].classList.add('final'); }, lastValid * 140);
    }
  } else {
    for(let s=lastValid; s>=0; s--){
      ((si)=>{
        setTimeout(()=>{
          segs[si].classList.remove('final','activo');
          spans[si].classList.remove('activo');
        }, (lastValid - si) * 140);
      })(s);
    }
  }
}

/* RELOJ */
function actualizarTiempo(){
  const ahora = new Date();
  const fecha = ahora.toLocaleDateString('es-AR');
  const horaTxt = ahora.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('hora').innerHTML = fecha + '<br>' + horaTxt;

  const mundial = new Date("2026-06-11T00:00:00-03:00");
  const diff = mundial - ahora;
  if(diff <= 0){
    document.getElementById('restante').innerHTML = '0 días<br>0h 0m';
    return;
  }
  const dias = Math.floor(diff / 86400000);
  const horas = Math.floor((diff % 86400000) / 3600000);
  const minutos = Math.floor((diff % 3600000) / 60000);
  document.getElementById('restante').innerHTML = dias + ' días<br>' + horas + 'h ' + minutos + 'm';
}
setInterval(actualizarTiempo,1000);
actualizarTiempo();
</script>

</body>
</html>
