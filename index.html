<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baliarda GVS</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at center,#0b1f3a 0%,#000 100%);
  font-family:"Comic Sans MS",cursive;
  color:white;
  text-align:center;
}

h1{margin-top:30px;}
h2{margin-top:10px;}

.controles{margin:20px;}
.controles label{margin:0 15px;cursor:pointer;}

.timeline{width:95%;margin:40px auto;}

.fila{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}
.celda{width:12%;}

/* COLORES */
.verde{color:#00ff88;}
.amarillo{color:#ffd000;}
.rojo{color:#ff3c3c;}

/* HORARIOS */
.horarios{
  display:flex;
  justify-content:space-between;
}
.horarios span{
  width:12%;
  opacity:0;
  transition:.3s;
}

/* CARRILES */
.carril{
  display:flex;
  justify-content:space-between;
  margin:30px 0;
  position:relative;
}

/* SEGMENTOS */
.segmento{
  width:10%;
  height:6px;
  border-radius:10px;
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .5s ease;
}

.segmento.activo{
  transform:scaleX(1);
}

/* PELOTA */
.pelota{
  position:absolute;
  top:50%;
  width:14px;
  height:14px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 25px currentColor;
  pointer-events:none;
  transition:left .5s cubic-bezier(.25,1.5,.5,1);
}

/* TRAIL */
.trail{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  opacity:.4;
  pointer-events:none;
  animation:fadeOut .6s forwards;
}

@keyframes fadeOut{
  to{
    opacity:0;
    transform:scale(.5);
  }
}
</style>
</head>

<body>

<h1>GVS PRODUCCIONES</h1>
<h2>CAMINO DE ARGENTINA - MUNDIAL</h2>

<div class="controles">
<label><input type="checkbox" onchange="toggle(0)">1°</label>
<label><input type="checkbox" onchange="toggle(1)">2°</label>
<label><input type="checkbox" onchange="toggle(2)">3°</label>
</div>

<div class="timeline">

<div class="fila">
<div class="celda">16/6</div>
<div class="celda">22/6</div>
<div class="celda">27/6</div>
<div class="celda">3/7</div>
<div class="celda">7/7</div>
<div class="celda">11/7</div>
<div class="celda">15/7</div>
<div class="celda">19/7</div>
</div>

<div class="fila">
<div class="celda">Grupos</div>
<div class="celda">Grupos</div>
<div class="celda">Grupos</div>
<div class="celda">16avos</div>
<div class="celda">Octavos</div>
<div class="celda">Cuartos</div>
<div class="celda">Semi</div>
<div class="celda">Final</div>
</div>

<div id="h1" class="horarios"></div>
<div id="h2" class="horarios"></div>
<div id="h3" class="horarios"></div>

<div id="c1" class="carril"></div>
<div id="c2" class="carril"></div>
<div id="c3" class="carril"></div>

</div>

<script>

const horarios=["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"];
const limites=[8,8,3];
const colores=["#00ff88","#ffd000","#ff3c3c"];
const carriles=["c1","c2","c3"];
const horariosIds=["h1","h2","h3"];

function init(){
  carriles.forEach(id=>{
    const c=document.getElementById(id);
    for(let i=0;i<8;i++){
      const s=document.createElement("div");
      s.className="segmento";
      c.appendChild(s);
    }
  });

  horariosIds.forEach(id=>{
    const c=document.getElementById(id);
    for(let i=0;i<8;i++){
      const s=document.createElement("span");
      s.textContent=horarios[i];
      c.appendChild(s);
    }
  });
}

init();

const estados=[false,false,false];
const progreso=[0,0,0];

function toggle(i){
  estados[i]=!estados[i];
  if(estados[i]) avanzar(i);
  else retroceder(i);
}

function avanzar(i){

  const cont=document.getElementById(carriles[i]);

  // 🔥 limpia pelotas previas
  cont.querySelectorAll(".pelota").forEach(p=>p.remove());

  const pelota=document.createElement("div");
  pelota.className="pelota";
  pelota.style.background=colores[i];
  pelota.style.color=colores[i];
  cont.appendChild(pelota);

  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){
    if(!estados[i]) return;
    if(progreso[i]>=limites[i]) return;

    const idx=progreso[i];

    seg[idx].classList.add("activo");
    seg[idx].style.background=colores[i];

    hrs[idx].style.opacity=1;
    hrs[idx].style.color=colores[i];

    const rect=seg[idx].getBoundingClientRect();
    const parent=cont.getBoundingClientRect();
    const x=(rect.left-parent.left+rect.width);

    pelota.style.left=x+"px";

    // trail
    const t=document.createElement("div");
    t.className="trail";
    t.style.background=colores[i];
    t.style.left=x+"px";
    t.style.top="50%";
    t.style.transform="translate(-50%,-50%)";
    cont.appendChild(t);
    setTimeout(()=>t.remove(),600);

    progreso[i]++;
    setTimeout(step,350);
  }

  step();
}

function retroceder(i){

  const cont=document.getElementById(carriles[i]);
  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){
    if(estados[i]) return;
    if(progreso[i]<=0){
      cont.querySelectorAll(".pelota").forEach(p=>p.remove());
      return;
    }

    progreso[i]--;

    seg[progreso[i]].classList.remove("activo");
    hrs[progreso[i]].style.opacity=0;

    setTimeout(step,150);
  }

  step();
}

</script>

</body>
</html>
