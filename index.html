<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Baliarda GVS</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<style>
*{box-sizing:border-box;font-family:"Comic Sans MS",cursive}
body{margin:0;background:radial-gradient(circle,#0b1f3a,#000);color:#fff;text-align:center}

.controles{margin:20px;display:flex;justify-content:center;gap:10px}

.btn{
  width:80px;height:60px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;background:#111;border:2px solid #333;cursor:pointer
}

.btn.activo{color:#000}
.btn[data-id="0"].activo{background:#00ff88}
.btn[data-id="1"].activo{background:#ffd000}
.btn[data-id="2"].activo,
.btn[data-id="3"].activo,
.btn[data-id="4"].activo{background:#ff3c3c}

.container{width:95%;margin:auto}

.carril{
  display:flex;
  gap:6px;
  position:relative;
  margin:30px 0;
  align-items:center;
}

.segmento{
  flex:1;height:6px;background:#222;
  transform:scaleX(0);transform-origin:left
}
.segmento.activo{
  transform:scaleX(1);
  box-shadow:0 0 10px currentColor
}

.pelota{
  position:absolute;
  top:50%;
  width:14px;height:14px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:left .2s linear;
  box-shadow:0 0 15px currentColor;
}

/* 🔥 TEXTO (AGREGADO) */
.texto-extra{
  position:absolute;
  left:100%;
  margin-left:12px;
  top:50%;
  transform:translateY(-50%) scale(0.6);
  color:#ff3c3c;
  opacity:0;
  transition:.3s;
  white-space:nowrap;
}
.texto-extra.show{
  opacity:1;
  transform:translateY(-50%) scale(1);
}
</style>
</head>

<body>

<div class="controles">
  <div class="btn" onclick="toggle(0,this)">1°</div>
  <div class="btn" onclick="toggle(1,this)">2°</div>
  <div class="btn" onclick="toggle(2,this)">Mejor<br>3</div>
  <div class="btn" onclick="toggle(3,this)">Peor<br>3</div>
  <div class="btn" onclick="toggle(4,this)">4°</div>
</div>

<div class="container">

<div id="c1" class="carril"></div>
<div id="c2" class="carril"></div>

<div id="c3" class="carril">
  <div id="t3" class="texto-extra">"A la espera de resultado de grupos"</div>
</div>

<div id="c4" class="carril">
  <div id="t4" class="texto-extra">"Para casa"</div>
</div>

<div id="c5" class="carril">
  <div id="t5" class="texto-extra">"Para casa"</div>
</div>

</div>

<script>

const colores=["#00ff88","#ffd000","#ff3c3c","#ff3c3c","#ff3c3c"];
const carriles=["c1","c2","c3","c4","c5"];
const limites=[8,8,3,3,3];

const estados=[false,false,false,false,false];
const progreso=[0,0,0,0,0];

function init(){
  carriles.forEach(id=>{
    const c=document.getElementById(id);
    for(let i=0;i<8;i++){
      const d=document.createElement("div");
      d.className="segmento";
      c.appendChild(d);
    }
  });
}
init();

function posicionarPelota(i){
  const cont=document.getElementById(carriles[i]);
  const pelota=cont.querySelector(".pelota");
  if(!pelota)return;

  const ancho=cont.offsetWidth/8;

  let idx=progreso[i]-1;
  if(idx<0)return;
  if(idx>=limites[i])idx=limites[i]-1;

  const posX=(idx*ancho)+(ancho/2);
  pelota.style.left=posX+"px";
}

function mostrarTexto(i){
  if(i===2) t3.classList.add("show");
  if(i===3) t4.classList.add("show");
  if(i===4) t5.classList.add("show");
}

function ocultarTexto(i){
  if(i===2) t3.classList.remove("show");
  if(i===3) t4.classList.remove("show");
  if(i===4) t5.classList.remove("show");
}

function toggle(i,el){
  estados[i]=!estados[i];
  el.classList.toggle("activo");

  if(!estados[i]) ocultarTexto(i);

  if(estados[i])avanzar(i);
  else retroceder(i);
}

function avanzar(i){
  const cont=document.getElementById(carriles[i]);

  cont.querySelectorAll(".pelota").forEach(p=>p.remove());

  const pelota=document.createElement("div");
  pelota.className="pelota";
  pelota.style.background=colores[i];
  cont.appendChild(pelota);

  const seg=cont.children;

  function step(){
    if(!estados[i])return;

    if(progreso[i]>=limites[i]){
      posicionarPelota(i);
      mostrarTexto(i);
      return;
    }

    seg[progreso[i]].classList.add("activo");
    seg[progreso[i]].style.background=colores[i];

    progreso[i]++;
    posicionarPelota(i);

    setTimeout(step,300);
  }

  step();
}

function retroceder(i){
  const cont=document.getElementById(carriles[i]);
  const seg=cont.children;

  function step(){
    if(estados[i])return;

    if(progreso[i]<=0){
      cont.querySelectorAll(".pelota").forEach(p=>p.remove());
      return;
    }

    progreso[i]--;
    seg[progreso[i]].classList.remove("activo");

    posicionarPelota(i);

    setTimeout(step,150);
  }

  step();
}

</script>

</body>
</html>
