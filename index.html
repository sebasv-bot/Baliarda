<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baliarda GVS</title>

<style>
*{font-family:"Comic Sans MS",cursive!important;box-sizing:border-box;}
body{margin:0;background:radial-gradient(circle,#0b1f3a,#000);color:#fff;text-align:center;}

.top-bar{
  position:absolute;top:10px;width:100%;
  display:flex;justify-content:space-between;padding:0 40px;
}

.panel{
  min-width:140px;padding:10px;border-radius:10px;
  background:rgba(0,0,0,0.3);
}

.panel-left{border:1px solid rgba(0,255,150,.4);box-shadow:0 0 10px rgba(0,255,150,.4);}
.panel-right{border:1px solid rgba(255,60,60,.4);box-shadow:0 0 10px rgba(255,60,60,.4);}

.panel-title{font-size:11px;opacity:.7;}
.panel-main{font-size:15px;}
.panel-sub{font-size:13px;opacity:.8;}

.gvs-title{margin-top:60px;font-size:36px;}
.gvs-line{width:300px;height:2px;margin:8px auto;background:#00aaff;}
.gvs-sub{font-size:14px;color:#aaa;}

.controles{margin:20px;display:flex;justify-content:center;gap:20px;}

.timeline{width:95%;margin:30px auto;}

.fila{display:flex;justify-content:space-between;flex-wrap:wrap;}
.celda{flex:1;min-width:120px;}

.horarios{display:flex;}
.horarios span{flex:1;opacity:0;}

.carril{display:flex;position:relative;margin:25px 0;}

.segmento{
  flex:1;height:6px;margin:0 3px;background:#333;
  transform:scaleX(0);transform-origin:left;transition:.4s;
}
.segmento.activo{transform:scaleX(1);}

.pelota{
  position:absolute;top:50%;
  width:14px;height:14px;border-radius:50%;
  transform:translate(-50%,-50%);
  transition:left .4s linear;
}

.campeon{animation:pulse 1s infinite;}
@keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.4);}}
</style>
</head>

<body>

<div class="top-bar">
  <div class="panel panel-left">
    <div class="panel-title">HOY</div>
    <div id="fecha" class="panel-main"></div>
    <div id="hora" class="panel-sub"></div>
  </div>

  <div class="panel panel-right">
    <div class="panel-title">TIEMPO RESTANTE</div>
    <div id="dias" class="panel-main"></div>
    <div id="horas" class="panel-sub"></div>
  </div>
</div>

<h1 class="gvs-title">GVS PRODUCCIONES</h1>
<div class="gvs-line"></div>
<div class="gvs-sub">Interactive Experience • Eventos en Vivo</div>

<div class="controles">
<label><input type="checkbox" onclick="toggle(0)">1°</label>
<label><input type="checkbox" onclick="toggle(1)">2°</label>
<label><input type="checkbox" onclick="toggle(2)">3°</label>
</div>

<div class="timeline">
<div class="fila">
<div class="celda">16/6</div><div class="celda">22/6</div><div class="celda">27/6</div>
<div class="celda">3/7</div><div class="celda">7/7</div><div class="celda">11/7</div>
<div class="celda">15/7</div><div class="celda">19/7</div>
</div>

<div id="h1" class="horarios"></div>
<div id="h2" class="horarios"></div>
<div id="h3" class="horarios"></div>

<div id="c1" class="carril"></div>
<div id="c2" class="carril"></div>
<div id="c3" class="carril"></div>
</div>

<script>

/* reloj */
setInterval(()=>{
  const n=new Date();
  fecha.innerText=n.toLocaleDateString("es-AR");
  hora.innerText=n.toLocaleTimeString("es-AR",{hour:'2-digit',minute:'2-digit'});

  const m=new Date("2026-06-11");
  const d=m-n;
  dias.innerText=Math.floor(d/86400000)+" días";
  horas.innerText=Math.floor((d/3600000)%24)+" hs";
},1000);

/* sistema */
const horarios=["22","14","23","19","13","22","16","16"];
const limites=[8,8,3];
const colores=["#0f8","#fd0","#f33"];
const carriles=["c1","c2","c3"];
const horariosIds=["h1","h2","h3"];

function init(){
  carriles.forEach(id=>{
    const c=document.getElementById(id);
    for(let i=0;i<8;i++){
      const d=document.createElement("div");
      d.className="segmento";
      c.appendChild(d);
    }
  });
}
init();

const estados=[false,false,false];
const progreso=[0,0,0];

function toggle(i){
  estados[i]=!estados[i];
  if(estados[i]) avanzar(i);
}

function avanzar(i){
  const cont=document.getElementById(carriles[i]);
  cont.innerHTML=cont.innerHTML; // limpia pelotas

  const pelota=document.createElement("div");
  pelota.className="pelota";
  pelota.style.background=colores[i];
  cont.appendChild(pelota);

  const seg=cont.children;

  function step(){

    if(!estados[i]) return;

    if(progreso[i]===limites[i]){
      const porcentaje=(limites[i]/limites[i])*100;
      pelota.style.left=porcentaje+"%";
      setTimeout(()=>pelota.classList.add("campeon"),200);
      return;
    }

    const idx=progreso[i];

    seg[idx].classList.add("activo");

    // 🔥 CORRECCIÓN FINAL
    const porcentaje=((idx+1)/limites[i])*100;
    pelota.style.left=porcentaje+"%";

    progreso[i]++;
    setTimeout(step,300);
  }

  step();
}

</script>

</body>
</html>
