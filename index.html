<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial Baliarda - Control Point Táctico Final 2026</title>
    <style>
        :root {
            --bg-dark: #010306;
            --neon-red: #ff3333;
            --neon-green: #00ff66;
            --neon-blue: #00aaff;
            --neon-yellow: #ffcc00;
            --neon-cyan: #00ffff;
            --3d-box-shadow: 0px 5px 15px rgba(0,0,0,0.8), 0 0 10px rgba(0, 170, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1400px;
            margin-bottom: 25px;
            z-index: 100;
        }

        .neon-box {
            padding: 10px 20px;
            border-radius: 12px;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            box-shadow: var(--3d-box-shadow);
        }

        .neon-box.red {
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red);
        }

        .neon-box.green {
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        h1.glow-title {
            text-align: center;
            font-size: 26px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin: 0;
            animation: slowShadow 5s infinite alternate ease-in-out;
        }

        @keyframes slowShadow {
            from { text-shadow: 0 0 12px rgba(255, 255, 255, 0.5); color: #fff; }
            to { text-shadow: 0 0 30px rgba(255, 255, 255, 1); color: #eee; }
        }

        /* BOTONES (Grilla de Dos Filas Alineada) */
        .button-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
            perspective: 1000px;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            transform: rotateX(10deg); /* Perspectiva */
        }

        .btn-ruta {
            background: rgba(0, 170, 255, 0.05);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            width: 130px;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: var(--3d-box-shadow);
            transform-style: preserve-3d;
        }

        .btn-ruta:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            transform: translateY(-3px) translateZ(10px);
            background: rgba(0, 255, 255, 0.1);
        }

        .btn-ruta.active {
            border-color: var(--neon-yellow);
            color: var(--neon-yellow);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            background: rgba(255, 204, 0, 0.1);
            transform: translateZ(15px);
        }

        /* MAPA / GLOBO TÁCTICO (Flotante y de Contornos) */
        .map-wrapper {
            position: relative;
            width: 90%;
            max-width: 1300px;
            height: 650px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* No hay recuadro ni fondo radial */
        }

        /* Grilla de perspectiva de fondo */
        .grid-bg {
            position: absolute;
            width: 200%; height: 200%;
            background-image: linear-gradient(rgba(0,170,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,170,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg) translateY(-25%) translateZ(-100px);
            opacity: 0.3;
            z-index: 1;
        }

        /* Globo terráqueo como esfera */
        .globe-sphere {
            position: relative;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle at 30% 30%, #0a1525 0%, #020508 80%);
            border-radius: 50%;
            box-shadow: 0px 30px 60px rgba(0,0,0,0.9) inset, 0 0 40px rgba(0, 170, 255, 0.2);
            overflow: hidden;
            z-index: 2;
            border: 1px solid rgba(0, 170, 255, 0.15);
        }

        /* Mapa de contornos nítidos (América del Norte) */
        .map-bg {
            position: absolute;
            top: 5%; left: 5%; width: 90%; height: 90%;
            /* Mapa SVG de contornos nítidos y transparentes (América del Norte, estados incluidos) */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ef/Outline_Map_of_North_America.svg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.8;
            /* Filtro neón verde preciso solo en contornos */
            filter: invert(1) sepia(1) saturate(10000%) hue-rotate(85deg) drop-shadow(0 0 6px var(--neon-green));
        }

        /* SVG de rutas (Responsive con viewBox) */
        svg#routes-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .route-line {
            fill: none;
            stroke: var(--neon-yellow);
            stroke-width: 9;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 12px var(--neon-yellow));
            stroke-dasharray: 2500;
            stroke-dashoffset: 2500;
            animation: drawLine 3s forwards ease-in-out;
        }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        /* Nodos de Estadios */
        .node {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--bg-dark);
            border: 3px solid var(--neon-yellow);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px var(--neon-yellow);
            z-index: 10;
        }

        .node-label {
            position: absolute;
            color: white;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.2px;
            text-shadow: 1px 1px 4px black, 0 0 6px white;
            transform: translate(-50%, -28px);
            z-index: 11;
        }

        /* TOOLTIP CYBERPUNK (Estadio Azteca F1) */
        .cyber-tooltip {
            position: absolute;
            background: rgba(5, 10, 16, 0.9);
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            z-index: 30;
            transform: translate(20px, -50%);
            opacity: 0;
            animation: fadeIn 0.6s 2s forwards; /* Entrada con retraso tras la ruta */
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .cyber-tooltip img {
            width: 100px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .cyber-tooltip .info {
            font-size: 12px;
            line-height: 1.5;
            color: #eee;
        }

        .cyber-tooltip .info strong {
            color: white;
            font-size: 14px;
            text-shadow: 0 0 6px var(--neon-cyan);
        }

        .cyber-tooltip .badge {
            font-size: 28px;
            font-weight: bold;
            color: var(--neon-cyan);
            text-shadow: 0 0 12px var(--neon-cyan);
            padding-left: 12px;
            border-left: 1px solid rgba(0, 255, 255, 0.4);
        }

        /* GVS Badge */
        .gvs-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
            z-index: 100;
        }

    </style>
</head>
<body>

    <header>
        <div class="neon-box red">
            <div id="date-display" style="font-size: 12px; margin-bottom: 5px;">--:--</div>
            <div id="clock-display" style="font-size: 18px; font-weight: bold;">--:--:--</div>
        </div>
        <h1 class="glow-title">POSIBLES RUTAS DE ARGENTINA<br>MUNDIAL 2026</h1>
        <div class="neon-box green">
            <div style="font-size: 10px; margin-bottom: 5px;">CUENTA REGRESIVA</div>
            <div id="countdown-display" style="font-size: 16px; font-weight: bold;">--D --H --M --S</div>
        </div>
    </header>

    <div class="button-area">
        <div class="button-row">
            <button class="btn-ruta" id="btn-campeon">CAMPEÓN DEL MUNDO</button>
            <button class="btn-ruta active" id="btn-2-puesto">2 PUESTO</button>
            <button class="btn-ruta">1 PRIMER<br>3 TERCERO</button>
            <button class="btn-ruta">2 SEGUNDO<br>3 TERCERO</button>
            <button class="btn-ruta">3 TERCERO<br>3 TERCERO</button>
            <button class="btn-ruta">4 CUARTO<br>3 TERCERO</button>
        </div>
        <div class="button-row">
            <button class="btn-ruta">5 QUINTO<br>3 TERCERO</button>
            <button class="btn-ruta">6 SEXTO<br>3 TERCERO</button>
            <button class="btn-ruta">7 SEPTIMO<br>3 TERCERO</button>
            <button class="btn-ruta">8 OCTAVO<br>3 TERCERO</button>
            <button class="btn-ruta" id="btn-3-puesto">3 PUESTO</button>
        </div>
    </div>

    <div class="map-wrapper" id="tactic-map">
        <div class="grid-bg"></div>
        <div class="globe-sphere">
            <div class="map-bg"></div>
            </div>
        
        <svg id="routes-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
        
        <div class="cyber-tooltip" style="left: 45%; top: 75%;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Estadio_Azteca_2015.jpg/320px-Estadio_Azteca_2015.jpg" alt="Estadio Azteca">
            <div class="info">
                <strong>Estadio Azteca</strong><br>
                Ciudad de México<br>
                16/06 22:00
            </div>
            <div class="badge">F1</div>
        </div>
    </div>

    <div class="gvs-badge">GVS PRODUCCIONES</div>

    <script>
        // Inicializar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', () => {
            initClock();
            initCountdown();
            initNodesAndRoutes();
            
            // Auto-activar la ruta 2 PUESTO al cargar
            setTimeout(() => {
                drawActiveRoute();
            }, 500);
        });

        // 1. RELOJ Y FECHA
        function initClock() {
            function updateClock() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('es-AR', { hour12: true });
                const days = ['DOM', 'LUN', 'MAR', 'MIÉ', 'JUE', 'VIE', 'SÁB'];
                const dateStr = `${days[now.getDay()]}, ${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth()+1).padStart(2, '0')}`;
                document.getElementById('clock-display').innerText = timeStr;
                document.getElementById('date-display').innerText = dateStr;
            }
            setInterval(updateClock, 1000);
            updateClock();
        }

        // 2. CUENTA REGRESIVA (Activación a 11 Junio 2026)
        function initCountdown() {
            const worldCupDate = new Date('June 11, 2026 00:00:00').getTime();
            function updateCountdown() {
                const now = new Date().getTime();
                const distance = worldCupDate - now;
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById('countdown-display').innerText = `${days}D ${String(hours).padStart(2, '0')}H ${String(minutes).padStart(2, '0')}M ${String(seconds).padStart(2, '0')}S`;
            }
            setInterval(updateCountdown, 1000);
            updateCountdown();
        }

        // 3. NODOS Y RUTAS (Datos Precisos de Referencia)
        // Posiciones relativas (en %) dentro de la esfera
        const nodesData = [
            { id: '8avos', label: '8AVOS', x: 25, y: 35 },
            { id: 'f2', label: 'F2', x: 38, y: 65 },
            { id: 'f1', label: 'F1', x: 45, y: 75 }, // Ciudad de México
            { id: 'f3', label: 'F3', x: 48, y: 55 },
            { id: '16avos', label: '16AVOS', x: 62, y: 40 },
            { id: '4tos', label: '4TOS', x: 60, y: 55 },
            { id: 'semis', label: 'SEMIS', x: 70, y: 35 },
            { id: 'final', label: 'FINAL', x: 80, y: 48 },
            { id: 'vuelta', label: 'NOS VOLVEMOS', x: 82, y: 52 }
        ];

        function initNodesAndRoutes() {
            const globeSphere = document.querySelector('.globe-sphere');
            
            // Inyectar Nodos
            nodesData.forEach(node => {
                const dot = document.createElement('div');
                dot.className = 'node';
                dot.style.left = node.x + '%';
                dot.style.top = node.y + '%';
                
                const label = document.createElement('div');
                label.className = 'node-label';
                label.innerText = node.label;
                label.style.left = node.x + '%';
                label.style.top = node.y + '%';
                
                globeSphere.appendChild(dot);
                globeSphere.appendChild(label);
            });
        }

        // Trazado de Ruta para '2 PUESTO' (Zigzag idéntico a la referencia)
        function drawActiveRoute() {
            const svg = document.getElementById('routes-svg');
            svg.innerHTML = ''; 
            
            // Ruta precisa en zigzag
            const pathData = `
                M ${nodesData.find(n=>n.id==='8avos').x} ${nodesData.find(n=>n.id==='8avos').y} 
                L ${nodesData.find(n=>n.id==='16avos').x} ${nodesData.find(n=>n.id==='16avos').y}
                L ${nodesData.find(n=>n.id==='f2').x} ${nodesData.find(n=>n.id==='f2').y}
                L ${nodesData.find(n=>n.id==='f1').x} ${nodesData.find(n=>n.id==='f1').y}
                L ${nodesData.find(n=>n.id==='f3').x} ${nodesData.find(n=>n.id==='f3').y}
                L ${nodesData.find(n=>n.id==='semis').x} ${nodesData.find(n=>n.id==='semis').y}
                L ${nodesData.find(n=>n.id==='4tos').x} ${nodesData.find(n=>n.id==='4tos').y}
                L ${nodesData.find(n=>n.id==='final').x} ${nodesData.find(n=>n.id==='final').y}
            `;

            const realPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            realPath.setAttribute('d', pathData);
            realPath.className = 'route-line';
            svg.appendChild(realPath);
        }

    </script>
</body>
</html>
