<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baliarda GVS</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at center,#0b1f3a 0%,#000 100%);
  font-family:"Comic Sans MS",cursive;
  color:white;
  text-align:center;
}

button{
  padding:10px 20px;
  margin:10px;
  font-size:16px;
  cursor:pointer;
}

.controles{margin:20px;}
.controles label{margin:0 15px;}

.timeline{width:95%;margin:40px auto;}

.fila{display:flex;justify-content:space-between;margin:10px 0;}
.celda{width:12%;}

.horarios{display:flex;justify-content:space-between;}
.horarios span{width:12%;opacity:0;transition:.3s;}

.carril{display:flex;justify-content:space-between;margin:30px 0;position:relative;}

.segmento{
  width:10%;
  height:6px;
  border-radius:10px;
  transform:scaleX(0);
  transform-origin:left;
  transition:.5s;
}

.segmento.activo{transform:scaleX(1);}

.pelota{
  position:absolute;
  top:50%;
  width:14px;
  height:14px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 25px currentColor;
  transition:left .5s cubic-bezier(.25,1.5,.5,1);
}

.campeon{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.4);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

.trail{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  opacity:.4;
  animation:fadeOut .6s forwards;
}

@keyframes fadeOut{
  to{opacity:0;transform:scale(.5);}
}
</style>
</head>

<body>

<h1>GVS PRODUCCIONES</h1>

<!-- 🔊 BOTÓN ACTIVAR -->
<button onclick="activarAudio()">🔊 Activar sonido</button>

<div class="controles">
<label><input type="checkbox" onchange="toggle(0)">1°</label>
<label><input type="checkbox" onchange="toggle(1)">2°</label>
<label><input type="checkbox" onchange="toggle(2)">3°</label>

<label style="margin-left:20px;">
<input type="checkbox" id="soundToggle" checked> 🔊 ON
</label>
</div>

<div class="timeline">

<div class="fila">
<div class="celda">16/6</div><div class="celda">22/6</div><div class="celda">27/6</div>
<div class="celda">3/7</div><div class="celda">7/7</div><div class="celda">11/7</div>
<div class="celda">15/7</div><div class="celda">19/7</div>
</div>

<div id="h1" class="horarios"></div>
<div id="h2" class="horarios"></div>
<div id="h3" class="horarios"></div>

<div id="c1" class="carril"></div>
<div id="c2" class="carril"></div>
<div id="c3" class="carril"></div>

</div>

<audio id="aplausos" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0b60.mp3"></audio>

<script>

let audioHabilitado=false;

function activarAudio(){
  const audio=document.getElementById("aplausos");
  audio.play().then(()=>{
    audio.pause();
    audio.currentTime=0;
    audioHabilitado=true;
    alert("Sonido activado 🔊");
  }).catch(()=>{
    alert("Tocá de nuevo");
  });
}

const horarios=["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"];
const limites=[8,8,3];
const colores=["#00ff88","#ffd000","#ff3c3c"];
const carriles=["c1","c2","c3"];
const horariosIds=["h1","h2","h3"];

function init(){
  carriles.forEach(id=>{
    const c=document.getElementById(id);
    for(let i=0;i<8;i++){
      const s=document.createElement("div");
      s.className="segmento";
      c.appendChild(s);
    }
  });

  horariosIds.forEach(id=>{
    const c=document.getElementById(id);
    for(let i=0;i<8;i++){
      const s=document.createElement("span");
      s.textContent=horarios[i];
      c.appendChild(s);
    }
  });
}

init();

const estados=[false,false,false];
const progreso=[0,0,0];

function toggle(i){
  estados[i]=!estados[i];
  if(estados[i]) avanzar(i);
}

function avanzar(i){

  const cont=document.getElementById(carriles[i]);
  cont.querySelectorAll(".pelota").forEach(p=>p.remove());

  const pelota=document.createElement("div");
  pelota.className="pelota";
  pelota.style.background=colores[i];
  pelota.style.color=colores[i];
  cont.appendChild(pelota);

  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){

    if(progreso[i]>=limites[i]){

      const last=limites[i]-1;
      const rect=seg[last].getBoundingClientRect();
      const parent=cont.getBoundingClientRect();
      const x=(rect.left-parent.left+rect.width);

      pelota.style.left=x+"px";
      pelota.classList.add("campeon");

      if(audioHabilitado && document.getElementById("soundToggle").checked){
        const audio=document.getElementById("aplausos");
        audio.currentTime=0;
        audio.play();
      }

      return;
    }

    const idx=progreso[i];

    seg[idx].classList.add("activo");
    seg[idx].style.background=colores[i];

    hrs[idx].style.opacity=1;

    const rect=seg[idx].getBoundingClientRect();
    const parent=cont.getBoundingClientRect();
    const x=(rect.left-parent.left+rect.width);

    pelota.style.left=x+"px";

    progreso[i]++;
    setTimeout(step,350);
  }

  step();
}

</script>

</body>
</html>
