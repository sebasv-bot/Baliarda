<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baliarda GVS</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #0b1f3a 0%, #000 100%);
  font-family: "Comic Sans MS", cursive;
  color: white;
  text-align: center;
}

h1 { margin-top: 30px; }
h2 { margin-top: 10px; }

.controles { margin: 20px; }
.controles label { margin: 0 15px; cursor: pointer; }

.timeline { width: 95%; margin: 40px auto; }

/* FILAS */
.fila {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.celda { width: 12%; }

/* COLORES */
.verde { color: #00ff88; }
.amarillo { color: #ffd000; }
.rojo { color: #ff3c3c; }

/* HORARIOS */
.horarios {
  display: flex;
  justify-content: space-between;
}

.horarios span {
  width: 12%;
  opacity: 0;
  transition: 0.3s;
}

/* CARRILES */
.carril {
  display: flex;
  justify-content: space-between;
  margin: 30px 0;
  position: relative;
}

/* SEGMENTOS */
.segmento {
  width: 10%;
  height: 6px;
  border-radius: 10px;
  background: transparent;
  transform: scaleX(0);
  transform-origin: left;
  transition: all 0.4s ease;
}

.segmento.activo {
  transform: scaleX(1);
}

/* PUNTO */
.segmento::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  right: -6px;
  top: 50%;
  transform: translateY(-50%);
  background: currentColor;
  box-shadow: 0 0 12px currentColor;
  opacity: 0;
}

.segmento.activo::after {
  opacity: 1;
}

/* PELOTA */
.pelota {
  position: absolute;
  top: 50%;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 20px currentColor;
  transition: left 0.4s linear;
}
</style>
</head>

<body>

<h1>GVS PRODUCCIONES</h1>
<h2>CAMINO DE ARGENTINA - MUNDIAL</h2>

<div class="controles">
  <label><input type="checkbox" onchange="toggle(0)">1° en fase de grupo</label>
  <label><input type="checkbox" onchange="toggle(1)">2° en fase de grupo</label>
  <label><input type="checkbox" onchange="toggle(2)">3° en fase de grupo</label>
</div>

<div class="timeline">

<!-- FECHAS -->
<div class="fila">
  <div class="celda">16/6 - lunes</div>
  <div class="celda">22/6 - domingo</div>
  <div class="celda">27/6 - viernes</div>
  <div class="celda">3/7 - miércoles</div>
  <div class="celda">7/7 - domingo</div>
  <div class="celda">11/7 - jueves</div>
  <div class="celda">15/7 - lunes</div>
  <div class="celda">19/7 - viernes</div>
</div>

<!-- ETAPAS -->
<div class="fila">
  <div class="celda">Fase de grupos</div>
  <div class="celda">Fase de grupos</div>
  <div class="celda">Fase de grupos</div>
  <div class="celda">16 Avos</div>
  <div class="celda">Octavos</div>
  <div class="celda">Cuartos</div>
  <div class="celda">Semifinal</div>
  <div class="celda">Final 🏆</div>
</div>

<!-- HORARIOS -->
<div id="h1" class="horarios"></div>
<div id="h2" class="horarios"></div>
<div id="h3" class="horarios"></div>

<!-- CARRILES -->
<div id="c1" class="carril"></div>
<div id="c2" class="carril"></div>
<div id="c3" class="carril"></div>

</div>

<script>

const horarios = ["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"];
const limites = [8,8,3];
const colores = ["verde","amarillo","rojo"];
const carriles = ["c1","c2","c3"];
const horariosIds = ["h1","h2","h3"];

function init(){
  carriles.forEach(id=>{
    const cont = document.getElementById(id);
    for(let i=0;i<8;i++){
      const s=document.createElement("div");
      s.className="segmento";
      cont.appendChild(s);
    }
  });

  horariosIds.forEach(id=>{
    const cont=document.getElementById(id);
    for(let i=0;i<8;i++){
      const s=document.createElement("span");
      s.textContent=horarios[i];
      cont.appendChild(s);
    }
  });
}

init();

const estados=[false,false,false];
const progreso=[0,0,0];
const pelotas=[null,null,null];

function toggle(i){
  estados[i]=!estados[i];

  if(estados[i]) avanzar(i);
  else retroceder(i);
}

function avanzar(i){

  const seg=document.getElementById(carriles[i]).children;
  const hrs=document.getElementById(horariosIds[i]).children;
  const cont=document.getElementById(carriles[i]);

  if(!pelotas[i]){
    const p=document.createElement("div");
    p.className="pelota";
    cont.appendChild(p);
    pelotas[i]=p;
  }

  const pelota=pelotas[i];
  pelota.style.background=getColor(colores[i]);
  pelota.style.color=getColor(colores[i]);

  function step(){
    if(!estados[i]) return;
    if(progreso[i]>=limites[i]) return;

    const idx=progreso[i];

    seg[idx].classList.add("activo");
    seg[idx].style.background=getColor(colores[i]);
    seg[idx].style.color=getColor(colores[i]);

    hrs[idx].style.opacity=1;
    hrs[idx].classList.add(colores[i]);

    const rect=seg[idx].getBoundingClientRect();
    const parent=cont.getBoundingClientRect();

    pelota.style.left=(rect.left-parent.left+rect.width)+"px";

    progreso[i]++;
    setTimeout(step,300);
  }

  step();
}

function retroceder(i){

  const seg=document.getElementById(carriles[i]).children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){
    if(estados[i]) return;
    if(progreso[i]<=0){
      if(pelotas[i]){
        pelotas[i].remove();
        pelotas[i]=null;
      }
      return;
    }

    progreso[i]--;

    seg[progreso[i]].classList.remove("activo");
    hrs[progreso[i]].style.opacity=0;

    setTimeout(step,150);
  }

  step();
}

function getColor(c){
  return c=="verde" ? "#00ff88" :
         c=="amarillo" ? "#ffd000" :
         "#ff3c3c";
}

</script>

</body>
</html>
