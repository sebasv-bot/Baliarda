<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baliarda GVS</title>

<style>
*{
  font-family:"Comic Sans MS", cursive !important;
}

body{
  margin:0;
  background: radial-gradient(circle at center,#0b1f3a 0%,#000 100%);
  color:white;
  text-align:center;
}

/* 🔹 PANELES SUPERIORES */
.top-bar{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.panel{
  width:160px;
  padding:10px;
  font-size:13px;
  color:#ccc;
  border-radius:8px;
  border:1px solid rgba(0,150,255,0.3);
  box-shadow:0 0 8px rgba(0,150,255,0.3);
  background:rgba(0,0,0,0.3);
}

.panel-title{
  font-size:12px;
  letter-spacing:1px;
  opacity:0.8;
  margin-bottom:5px;
}

.panel-main{
  font-size:16px;
  color:white;
}

.panel-sub{
  font-size:13px;
  opacity:0.8;
}

/* 🔹 GVS */
.gvs-title{
  margin-top:50px;
  font-size:36px;
  letter-spacing:2px;
  background: linear-gradient(180deg,#ffffff 0%,#bbbbbb 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:
    0 0 10px rgba(255,255,255,0.6),
    0 0 20px rgba(0,150,255,0.4);
}

.gvs-line{
  width:300px;
  height:2px;
  margin:8px auto;
  background:linear-gradient(90deg,transparent,#00aaff,transparent);
  box-shadow:0 0 10px #00aaff;
}

.gvs-sub{
  font-size:14px;
  color:#aaa;
  margin-bottom:10px;
}

/* CONTROLES */
.controles{margin:20px;}

.timeline{width:95%;margin:30px auto;}

.fila{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
}

.celda{width:12%;}

/* HORARIOS */
.horarios{
  display:flex;
  justify-content:space-between;
}

.horarios span{
  width:12%;
  opacity:0;
  transition:.3s;
}

/* CARRILES */
.carril{
  display:flex;
  justify-content:space-between;
  margin:25px 0;
  position:relative;
}

/* SEGMENTOS */
.segmento{
  width:10%;
  height:6px;
  background:#333;
  transform:scaleX(0);
  transform-origin:left;
  transition:.4s;
}

.segmento.activo{
  transform:scaleX(1);
}

/* PELOTA */
.pelota{
  position:absolute;
  top:50%;
  width:14px;
  height:14px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:left .4s linear;
  box-shadow:0 0 15px currentColor;
}

/* CAMPEON */
.campeon{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.4);}
  100%{transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<!-- 🔹 PANELES -->
<div class="top-bar">
  <div class="panel">
    <div class="panel-title">HOY</div>
    <div id="fecha" class="panel-main"></div>
    <div id="hora" class="panel-sub"></div>
  </div>

  <div class="panel">
    <div class="panel-title">TIEMPO RESTANTE</div>
    <div id="dias" class="panel-main"></div>
    <div id="horas" class="panel-sub"></div>
  </div>
</div>

<h1 class="gvs-title">GVS PRODUCCIONES</h1>
<div class="gvs-line"></div>
<div class="gvs-sub">Interactive Experience • Eventos en Vivo</div>

<div class="controles">
<label><input type="checkbox" onclick="toggle(0)">1° en fase de grupo</label>
<label><input type="checkbox" onclick="toggle(1)">2° en fase de grupo</label>
<label><input type="checkbox" onclick="toggle(2)">3° en fase de grupo</label>
</div>

<div class="timeline">

<div class="fila">
<div class="celda">16/6 - lunes</div>
<div class="celda">22/6 - domingo</div>
<div class="celda">27/6 - viernes</div>
<div class="celda">3/7 - miércoles</div>
<div class="celda">7/7 - domingo</div>
<div class="celda">11/7 - jueves</div>
<div class="celda">15/7 - lunes</div>
<div class="celda">19/7 - viernes</div>
</div>

<div class="fila">
<div class="celda">Fase de grupos</div>
<div class="celda">Fase de grupos</div>
<div class="celda">Fase de grupos</div>
<div class="celda">16 Avos</div>
<div class="celda">Octavos</div>
<div class="celda">Cuartos</div>
<div class="celda">Semifinal</div>
<div class="celda">Final 🏆</div>
</div>

<div id="h1" class="horarios"></div>
<div id="h2" class="horarios"></div>
<div id="h3" class="horarios"></div>

<div id="c1" class="carril"></div>
<div id="c2" class="carril"></div>
<div id="c3" class="carril"></div>

</div>

<script>

/* 🔹 FECHA Y HORA */
function actualizarHora(){
  const now=new Date();
  document.getElementById("fecha").innerText=now.toLocaleDateString("es-AR");
  document.getElementById("hora").innerText=now.toLocaleTimeString("es-AR",{hour:'2-digit',minute:'2-digit'});
}

/* 🔹 COUNTDOWN */
const mundial=new Date("2026-06-11T00:00:00");

function actualizarCountdown(){
  const now=new Date();
  const diff=mundial-now;

  const dias=Math.floor(diff/(1000*60*60*24));
  const horas=Math.floor((diff/(1000*60*60))%24);

  document.getElementById("dias").innerText=dias+" días";
  document.getElementById("horas").innerText=horas+" hs";
}

setInterval(()=>{
  actualizarHora();
  actualizarCountdown();
},1000);

/* 🔹 SISTEMA ORIGINAL */

const horarios=["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"];
const limites=[8,8,3];
const colores=["#00ff88","#ffd000","#ff3c3c"];
const carriles=["c1","c2","c3"];
const horariosIds=["h1","h2","h3"];

function init(){
  carriles.forEach(id=>{
    const c=document.getElementById(id);
    for(let i=0;i<8;i++){
      const s=document.createElement("div");
      s.className="segmento";
      c.appendChild(s);
    }
  });

  horariosIds.forEach(id=>{
    const c=document.getElementById(id);
    for(let i=0;i<8;i++){
      const s=document.createElement("span");
      s.textContent=horarios[i];
      c.appendChild(s);
    }
  });
}

init();

const estados=[false,false,false];
const progreso=[0,0,0];

function toggle(i){
  estados[i]=!estados[i];
  if(estados[i]) avanzar(i);
  else retroceder(i);
}

function avanzar(i){

  const cont=document.getElementById(carriles[i]);
  cont.querySelectorAll(".pelota").forEach(p=>p.remove());

  const pelota=document.createElement("div");
  pelota.className="pelota";
  pelota.style.background=colores[i];
  cont.appendChild(pelota);

  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){

    if(!estados[i]) return;

    if(progreso[i]===limites[i]){

      const last=limites[i]-1;
      const rect=seg[last].getBoundingClientRect();
      const parent=cont.getBoundingClientRect();

      pelota.style.left=(rect.left-parent.left+rect.width)+"px";

      setTimeout(()=>{
        pelota.classList.add("campeon");
      },200);

      return;
    }

    const idx=progreso[i];

    seg[idx].classList.add("activo");
    seg[idx].style.background=colores[i];

    hrs[idx].style.opacity=1;
    hrs[idx].style.color=colores[i];

    const rect=seg[idx].getBoundingClientRect();
    const parent=cont.getBoundingClientRect();

    pelota.style.left=(rect.left-parent.left+rect.width)+"px";

    progreso[i]++;
    setTimeout(step,300);
  }

  step();
}

function retroceder(i){

  const cont=document.getElementById(carriles[i]);
  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){

    if(estados[i]) return;

    if(progreso[i]<=0){
      cont.querySelectorAll(".pelota").forEach(p=>p.remove());
      return;
    }

    progreso[i]--;

    seg[progreso[i]].classList.remove("activo");

    hrs[progreso[i]].style.opacity=0;
    hrs[progreso[i]].style.color="";

    setTimeout(step,150);
  }

  step();
}

</script>

</body>
</html>
