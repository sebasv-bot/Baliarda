<style>
    :root { --blue: #00aaff; --red: #ff3c3c; --green: #00ff88; --turq: #00e5ff; --yellow: #ffd000; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
    
    .dashboard-container { padding: 20px; display: flex; flex-direction: column; align-items: center; height: 100vh; box-sizing: border-box; background: radial-gradient(circle at 50% 50%, #0a1018 0%, #000 100%); position: relative; }

    /* CABECERA CON TÍTULO ANIMADO */
    .header-line { width: 100%; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-bottom: 5px; gap: 20px; }
    .panel-box { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 8px; text-align: center; min-width: 140px; }
    .time-now { border: 2px solid var(--red); color: var(--red); box-shadow: 0 0 15px var(--red); justify-self: start; }
    .time-remaining { border: 2px solid var(--green); color: var(--green); box-shadow: 0 0 15px var(--green); justify-self: end; }

    .shining-title { 
        font-size: 1.1rem; letter-spacing: 4px; text-align: center; font-weight: 800; margin: 0; text-transform: uppercase;
        background: linear-gradient(90deg, #222 0%, #666 45%, #fff 50%, #666 55%, #222 100%);
        background-size: 200% auto; 
        -webkit-background-clip: text; 
        -webkit-text-fill-color: transparent;
        animation: shine 5s linear infinite; /* Animación activada aquí */
    }
    @keyframes shine { 
        0% { background-position: -100% center; }
        100% { background-position: 100% center; }
    }

    /* BOTONES */
    .control-panel { display: flex; flex-direction: column; gap: 8px; margin: 20px 0; width: 100%; max-width: 1250px; z-index: 10; }
    .button-row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 8px; }
    .action-btn { width: 100%; height: 38px; background: #080808; border: 1px solid #1a1a1a; color: #444; border-radius: 4px; cursor: pointer; font-size: 8px; font-weight: 900; transition: 0.3s; text-transform: uppercase; }

    .on-verde { background: var(--green)!important; color: #000!important; box-shadow: 0 0 20px var(--green); border-color: #fff!important; }
    .on-amarillo { background: var(--yellow)!important; color: #000!important; box-shadow: 0 0 20px var(--yellow); border-color: #fff!important; }
    .on-rojo { background: var(--red)!important; color: #000!important; box-shadow: 0 0 20px var(--red); border-color: #fff!important; }
    .on-turq { background: var(--turq)!important; color: #000!important; box-shadow: 0 0 20px var(--turq); border-color: #fff!important; }

    /* DISPLAY AREA */
    .display-area { flex-grow: 1; width: 100%; max-width: 1250px; display: flex; flex-direction: column; justify-content: center; position: relative; }
    .grid-header { display: flex; width: 100%; gap: 10px; margin-bottom: 125px; opacity: 0; transition: 0.3s; }
    .grid-header.active { opacity: 1; }
    
    .seg-box { flex: 1; text-align: center; color: #222; transition: 0.3s; }
    .seg-name { font-size: 16px; font-weight: 900; opacity: 0.8; text-transform: uppercase; margin-bottom: 4px; }
    .seg-date { font-size: 22px; font-weight: 800; letter-spacing: -1px; }

    .rows-stack { position: relative; height: 50px; width: 100%; }
    .horarios-row { display: flex; width: 100%; gap: 10px; position: absolute; top:0; left:0; right:0; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 1; }
    .horarios-row.active { opacity: 1; pointer-events: all; z-index: 100; }

    /* GLASS BOX & TOOLTIP */
    .glass-box { 
        flex: 1; height: 48px; background: #050505; border: 1px solid #111; border-radius: 6px; 
        display: flex; align-items: center; justify-content: center; font-size: 14px; 
        font-weight: bold; color: #111; position: relative; cursor: help;
    }
    
    .tooltip {
        position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
        background: rgba(5, 10, 20, 0.98); color: #fff; padding: 12px; border-radius: 8px;
        font-size: 10px; width: 200px; text-align: center; pointer-events: none;
        opacity: 0; transition: 0.25s; border: 1px solid #444; z-index: 9999;
        box-shadow: 0 10px 40px rgba(0,0,0,1); visibility: hidden;
    }
    
    .glass-box:hover .tooltip { opacity: 1; visibility: visible; bottom: 130%; border-color: var(--turq); }
    .tooltip b { color: var(--turq); display: block; margin-bottom: 6px; font-size: 13px; text-transform: uppercase; }
    
    .tooltip-img {
        width: 100%; height: 110px; border-radius: 4px;
        margin-bottom: 10px; object-fit: cover; display: block;
        background: #1a1a1a;
    }

    .hidden-segment { display: none !important; }
    .regreso-box { flex: 6; color: var(--turq)!important; border-color: var(--turq)!important; text-shadow: 0 0 10px var(--turq); background: rgba(0,229,255,0.05); font-size: 16px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; border-style: dashed; }

    .carril-centrado { width: 100%; height: 3px; background: #111; margin-top: 60px; opacity: 0; transition: 0.5s; position: relative; }
    .carril-centrado.active { opacity: 1; }
    .progreso-bar { height: 100%; width: 0%; transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1); }

    .pulse { animation: p 2s infinite ease-in-out; }
    @keyframes p { 0%, 100% { box-shadow: 0 0 5px currentColor; } 50% { box-shadow: 0 0 15px currentColor; } }

    .main-footer { position: absolute; bottom: 15px; right: 25px; color: #333; font-size: 9px; letter-spacing: 2px; font-weight: bold; }
</style>

<div class="dashboard-container">
    <div class="header-line">
        <div class="panel-box time-now"><div id="hora">--:--:--</div></div>
        <h1 class="shining-title">POSIBLES RUTAS DE ARGENTINA<br>MUNDIAL 2026</h1>
        <div class="panel-box time-remaining"><div id="restante">-- DÍAS</div></div>
    </div>

    <div class="control-panel">
        <div id="row-1" class="button-row"></div>
        <div id="row-2" class="button-row"></div>
    </div>

    <div class="display-area">
        <div class="grid-header" id="main-header">
            <div class="seg-box" id="s0"><div class="seg-name">F1</div><div class="seg-date">12/06 - Jue</div></div>
            <div class="seg-box" id="s1"><div class="seg-name">F2</div><div class="seg-date">16/06 - Mar</div></div>
            <div class="seg-box" id="s2"><div class="seg-name">F3</div><div class="seg-date">20/06 - Sab</div></div>
            <div class="seg-box" id="s3"><div class="seg-name">16avos</div><div class="seg-date">04/07 - Sab</div></div>
            <div class="seg-box" id="s4"><div class="seg-name">8avos</div><div class="seg-date">08/07 - Mie</div></div>
            <div class="seg-box" id="s5"><div class="seg-name">4tos</div><div class="seg-date">11/07 - Sab</div></div>
            <div class="seg-box" id="s6"><div class="seg-name">Semis</div><div class="seg-date">15/07 - Mie</div></div>
            <div class="seg-box" id="s7"><div class="seg-name">3er P.</div><div class="seg-date">18/07 - Sab</div></div>
            <div class="seg-box" id="s8"><div class="seg-name">Final</div><div class="seg-date">19/07 - Dom</div></div>
        </div>
        <div class="rows-stack" id="dynamic-grid"></div>
        <div id="wrapper-carril" style="width:100%"><div class="carril-centrado" id="main-carril"><div id="main-progreso" class="progreso-bar"></div></div></div>
    </div>
    <footer class="main-footer">GVS PRODUCCIONES</footer>
</div>

<script>
    const config = [
        { t: "1 PUESTO", on: "on-verde", c: "#00ff88" },
        { t: "2 PUESTO", on: "on-amarillo", c: "#ffd000" },
        { t: "1 PRIMER<br>3 TERCERO", on: "on-rojo", c: "#ff3c3c" },
        { t: "2 SEGUNDO<br>3 TERCERO", on: "on-rojo", c: "#ff3c3c" },
        { t: "3 TERCERO<br>3 TERCERO", on: "on-rojo", c: "#ff3c3c" },
        { t: "4 CUARTO<br>3 TERCERO", on: "on-rojo", c: "#ff3c3c" },
        { t: "5 QUINTO<br>3 TERCERO", on: "on-rojo", c: "#ff3c3c" },
        { t: "6 SEXTO<br>3 TERCERO", on: "on-rojo", c: "#ff3c3c" },
        { t: "7 SEPTIMO<br>3 TERCERO", on: "on-rojo", c: "#ff3c3c" },
        { t: "8 OCTAVO<br>3 TERCERO", on: "on-rojo", c: "#ff3c3c" },
        { t: "4 PUESTO", on: "on-turq", c: "#00e5ff" }
    ];

    const dataPartidos = [
        { f: "Fase de Grupos", e: "Estadio Azteca", l: "CDMX", i: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=400" },
        { f: "Fase de Grupos", e: "MetLife Stadium", l: "New Jersey", i: "https://images.unsplash.com/photo-1564112105441-32b0051df099?auto=format&fit=crop&w=400" },
        { f: "Fase de Grupos", e: "Hard Rock Stadium", l: "Miami", i: "https://images.unsplash.com/photo-1513297856429-055d1df64376?auto=format&fit=crop&w=400" },
        { f: "Dieciseisavos", e: "SoFi Stadium", l: "Los Ángeles", i: "https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&w=400" },
        { f: "Octavos de Final", e: "AT&T Stadium", l: "Dallas", i: "https://images.unsplash.com/photo-1495366554757-a0203a5703eb?auto=format&fit=crop&w=400" },
        { f: "Cuartos de Final", e: "Arrowhead Stadium", l: "Kansas City", i: "https://images.unsplash.com/photo-1504450758481-7338eba7524a?auto=format&fit=crop&w=400" },
        { f: "Semifinal", e: "Mercedes-Benz Stadium", l: "Atlanta", i: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=400" },
        { f: "Tercer Puesto", e: "Hard Rock Stadium", l: "Miami", i: "https://images.unsplash.com/photo-1522770179533-24471fcdba45?auto=format&fit=crop&w=400" },
        { f: "Gran Final", e: "MetLife Stadium", l: "New Jersey", i: "https://images.unsplash.com/photo-1551290464-666324a0d95e?auto=format&fit=crop&w=400" }
    ];

    const horarios = ["22:00","14:00","23:00","22:00","17:00","22:00","21:00","21:00","17:00"];
    let seleccionado = -1;

    function resetVisuals() {
        document.querySelectorAll('.action-btn').forEach(b => b.className = "action-btn");
        document.querySelectorAll('.horarios-row').forEach(r => r.classList.remove('active'));
        document.querySelectorAll('.seg-box').forEach(s => { s.classList.remove('hidden-segment'); s.style.color = "#222"; });
        document.querySelectorAll('.glass-box').forEach(b => { b.classList.remove('hidden-segment', 'pulse'); b.style.color = "#111"; b.style.borderColor = "#111"; });
        document.getElementById('main-header').classList.remove('active');
        document.getElementById('main-carril').classList.remove('active');
        document.getElementById('wrapper-carril').style.width = "100%";
    }

    function activar(idx, fila) {
        const id = fila === 1 ? idx : idx + 100;
        if (seleccionado === id) { resetVisuals(); seleccionado = -1; return; }
        resetVisuals();
        seleccionado = id;
        const c = config[idx];
        document.getElementById(`btn-${fila}-${idx}`).classList.add(c.on);
        document.getElementById('main-header').classList.add('active');
        const row = document.getElementById(`grid-${fila}-${idx}`);
        row.classList.add('active');
        
        const boxes = row.getElementsByClassName('glass-box');
        for(let i=0; i<boxes.length; i++) {
            if(idx === 10) { 
                if(i < 3) {
                    boxes[i].style.color = c.c; boxes[i].style.borderColor = c.c; boxes[i].classList.add('pulse');
                    document.getElementById(`s${i}`).style.color = c.c;
                } else {
                    if(document.getElementById(`s${i}`)) document.getElementById(`s${i}`).classList.add('hidden-segment');
                    if(!boxes[i].classList.contains('regreso-box')) boxes[i].classList.add('hidden-segment');
                }
                document.getElementById('wrapper-carril').style.width = "31.5%";
            } else {
                let apagado = (fila === 1 && i === 7) || (fila === 2 && i === 8);
                if(!apagado) {
                    boxes[i].style.color = c.c; boxes[i].style.borderColor = c.c; boxes[i].classList.add('pulse');
                    document.getElementById(`s${i}`).style.color = c.c;
                }
            }
        }
        document.getElementById('main-carril').classList.add('active');
        const bar = document.getElementById('main-progreso');
        bar.style.background = c.c;
        bar.style.boxShadow = `0 0 15px ${c.c}`;
        bar.style.width = (idx === 10) ? "100%" : (fila === 2 ? "88%" : "100%");
    }

    function getTooltipHTML(pData) {
        return `<div class="tooltip">
                    <img src="${pData.i}" class="tooltip-img" alt="Estadio">
                    <b>${pData.f}</b>
                    ${pData.e}<br>
                    ${pData.l}
                </div>`;
    }

    function init() {
        const r1 = document.getElementById("row-1");
        const r2 = document.getElementById("row-2");
        const grid = document.getElementById("dynamic-grid");

        config.forEach((btn, i) => {
            const b1 = document.createElement("button");
            b1.className = "action-btn"; b1.id = `btn-1-${i}`; b1.innerHTML = btn.t;
            b1.onclick = () => activar(i, 1); r1.appendChild(b1);
            
            const g = document.createElement("div"); g.className = "horarios-row"; g.id = `grid-1-${i}`;
            if(i === 10) {
                [0,1,2].forEach(idx => { g.innerHTML += `<div class="glass-box">${horarios[idx]}${getTooltipHTML(dataPartidos[idx])}</div>`; });
                g.innerHTML += `<div class="glass-box regreso-box pulse">Nos Volvemos</div>`;
            } else {
                horarios.forEach((h, idx) => { g.innerHTML += `<div class="glass-box">${h}${getTooltipHTML(dataPartidos[idx])}</div>`; });
                const g2 = document.createElement("div"); g2.className = "horarios-row"; g2.id = `grid-2-${i}`;
                horarios.forEach((h, idx) => { g2.innerHTML += `<div class="glass-box">${h}${getTooltipHTML(dataPartidos[idx])}</div>`; });
                grid.appendChild(g2);
                const b2 = document.createElement("button");
                b2.className = "action-btn"; b2.id = `btn-2-${i}`; 
                b2.innerHTML = btn.t.replace("PRIMER", "1°").replace("SEGUNDO", "2°");
                b2.onclick = () => activar(i, 2); r2.appendChild(b2);
            }
            grid.appendChild(g);
        });

        setInterval(() => {
            const n = new Date();
            document.getElementById('hora').innerHTML = `${n.getDate()}/${n.getMonth()+1}/${n.getFullYear()}<br>${n.toLocaleTimeString()}`;
            const res = new Date("2026-06-11T00:00:00") - n;
            document.getElementById('restante').innerHTML = `${Math.floor(res/86400000)} DÍAS`;
        }, 1000);
    }
    init();
</script>
