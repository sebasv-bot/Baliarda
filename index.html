<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baliarda GVS</title>

<style>
*{
  font-family:"Comic Sans MS", cursive !important;
  box-sizing:border-box;
}

body{
  margin:0;
  background: radial-gradient(circle at center,#0b1f3a 0%,#000 100%);
  color:white;
  text-align:center;
}

/* 🔹 TOP BAR */
.top-bar{
  position:absolute;
  top:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 40px;
}

/* PANELES */
.panel{
  min-width:140px;
  padding:10px 14px;
  font-size:13px;
  border-radius:10px;
  background:rgba(0,0,0,0.35);
}

/* COLORES */
.panel-left{
  border:1px solid rgba(0,255,150,0.4);
  box-shadow:0 0 10px rgba(0,255,150,0.4);
}

.panel-right{
  border:1px solid rgba(255,60,60,0.4);
  box-shadow:0 0 10px rgba(255,60,60,0.4);
}

.panel-title{
  font-size:11px;
  opacity:0.7;
}

.panel-main{
  font-size:15px;
}

.panel-sub{
  font-size:13px;
  opacity:0.8;
}

/* GVS */
.gvs-title{
  margin-top:60px;
  font-size:36px;
  letter-spacing:2px;
  background: linear-gradient(180deg,#ffffff 0%,#bbbbbb 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.gvs-line{
  width:300px;
  height:2px;
  margin:8px auto;
  background:linear-gradient(90deg,transparent,#00aaff,transparent);
}

.gvs-sub{
  font-size:14px;
  color:#aaa;
}

/* CONTROLES */
.controles{
  margin:20px;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

/* TIMELINE */
.timeline{
  width:95%;
  margin:30px auto;
}

.fila{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

.celda{
  flex:1;
  min-width:120px;
}

/* HORARIOS */
.horarios{
  display:flex;
}

.horarios span{
  flex:1;
  opacity:0;
  transition:.3s;
}

/* CARRILES */
.carril{
  display:flex;
  position:relative;
  margin:25px 0;
}

/* SEGMENTOS */
.segmento{
  flex:1;
  height:6px;
  margin:0 3px;
  background:#333;
  transform:scaleX(0);
  transform-origin:left;
  transition:.4s;
}

.segmento.activo{
  transform:scaleX(1);
}

/* PELOTA */
.pelota{
  position:absolute;
  top:50%;
  width:14px;
  height:14px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:left .4s linear;
}

/* CAMPEON */
.campeon{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{transform:translate(-50%,-50%) scale(1.4);}
}
</style>
</head>

<body>

<!-- PANELES -->
<div class="top-bar">
  <div class="panel panel-left">
    <div class="panel-title">HOY</div>
    <div id="fecha" class="panel-main"></div>
    <div id="hora" class="panel-sub"></div>
  </div>

  <div class="panel panel-right">
    <div class="panel-title">TIEMPO RESTANTE</div>
    <div id="dias" class="panel-main"></div>
    <div id="horas" class="panel-sub"></div>
  </div>
</div>

<h1 class="gvs-title">GVS PRODUCCIONES</h1>
<div class="gvs-line"></div>
<div class="gvs-sub">Interactive Experience • Eventos en Vivo</div>

<div class="controles">
<label><input type="checkbox" onclick="toggle(0)">1° en fase de grupo</label>
<label><input type="checkbox" onclick="toggle(1)">2° en fase de grupo</label>
<label><input type="checkbox" onclick="toggle(2)">3° en fase de grupo</label>
</div>

<div class="timeline">

<div class="fila">
<div class="celda">16/6 - lunes</div>
<div class="celda">22/6 - domingo</div>
<div class="celda">27/6 - viernes</div>
<div class="celda">3/7 - miércoles</div>
<div class="celda">7/7 - domingo</div>
<div class="celda">11/7 - jueves</div>
<div class="celda">15/7 - lunes</div>
<div class="celda">19/7 - viernes</div>
</div>

<div class="fila">
<div class="celda">Fase de grupos</div>
<div class="celda">Fase de grupos</div>
<div class="celda">Fase de grupos</div>
<div class="celda">16 Avos</div>
<div class="celda">Octavos</div>
<div class="celda">Cuartos</div>
<div class="celda">Semifinal</div>
<div class="celda">Final 🏆</div>
</div>

<div id="h1" class="horarios"></div>
<div id="h2" class="horarios"></div>
<div id="h3" class="horarios"></div>

<div id="c1" class="carril"></div>
<div id="c2" class="carril"></div>
<div id="c3" class="carril"></div>

</div>

<script>

/* FECHA */
setInterval(()=>{
  const now=new Date();
  document.getElementById("fecha").innerText=now.toLocaleDateString("es-AR");
  document.getElementById("hora").innerText=now.toLocaleTimeString("es-AR",{hour:'2-digit',minute:'2-digit'});

  const mundial=new Date("2026-06-11T00:00:00");
  const diff=mundial-now;

  document.getElementById("dias").innerText=Math.floor(diff/86400000)+" días";
  document.getElementById("horas").innerText=Math.floor((diff/3600000)%24)+" hs";

},1000);

/* SISTEMA */
const horarios=["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"];
const limites=[8,8,3];
const colores=["#00ff88","#ffd000","#ff3c3c"];
const carriles=["c1","c2","c3"];
const horariosIds=["h1","h2","h3"];

function init(){
  carriles.forEach(id=>{
    const c=document.getElementById(id);
    for(let i=0;i<8;i++){
      const d=document.createElement("div");
      d.className="segmento";
      c.appendChild(d);
    }
  });

  horariosIds.forEach(id=>{
    const c=document.getElementById(id);
    for(let i=0;i<8;i++){
      const s=document.createElement("span");
      s.textContent=horarios[i];
      c.appendChild(s);
    }
  });
}

init();

const estados=[false,false,false];
const progreso=[0,0,0];

function toggle(i){
  estados[i]=!estados[i];
  if(estados[i]) avanzar(i);
  else retroceder(i);
}

function avanzar(i){

  const cont=document.getElementById(carriles[i]);
  cont.querySelectorAll(".pelota").forEach(p=>p.remove());

  const pelota=document.createElement("div");
  pelota.className="pelota";
  pelota.style.background=colores[i];
  cont.appendChild(pelota);

  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){

    if(!estados[i]) return;

    if(progreso[i]===limites[i]){
      pelota.style.left="100%";
      setTimeout(()=>pelota.classList.add("campeon"),200);
      return;
    }

    const idx=progreso[i];

    seg[idx].classList.add("activo");
    seg[idx].style.background=colores[i];

    hrs[idx].style.opacity=1;
    hrs[idx].style.color=colores[i];

    // 🔥 POSICIÓN RESPONSIVE
    const porcentaje=((idx+1)/limites[i])*100;
    pelota.style.left=porcentaje+"%";

    progreso[i]++;
    setTimeout(step,300);
  }

  step();
}

function retroceder(i){

  const cont=document.getElementById(carriles[i]);
  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){

    if(estados[i]) return;

    if(progreso[i]<=0){
      cont.querySelectorAll(".pelota").forEach(p=>p.remove());
      return;
    }

    progreso[i]--;

    seg[progreso[i]].classList.remove("activo");

    hrs[progreso[i]].style.opacity=0;
    hrs[progreso[i]].style.color="";

    setTimeout(step,150);
  }

  step();
}

</script>

</body>
</html>
