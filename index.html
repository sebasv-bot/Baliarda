<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baliarda GVS WOW</title>

<style>
*{box-sizing:border-box;font-family:"Comic Sans MS",cursive}
body{
  margin:0;
  background:radial-gradient(circle,#0b1f3a,#000);
  color:#fff;
  text-align:center;
}

/* ENTRADA */
body{
  opacity:0;
  transform:scale(1.05);
  animation:entrada 1s ease forwards;
}
@keyframes entrada{
  to{opacity:1;transform:scale(1)}
}

/* LATIDO */
@keyframes latido{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

/* TOP */
.top-bar{
  position:absolute;top:10px;width:100%;
  display:flex;justify-content:space-between;padding:0 30px;
}

.panel{
  padding:10px 14px;border-radius:10px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
}

.panel-left{box-shadow:0 0 15px rgba(0,255,150,.5)}
.panel-right{box-shadow:0 0 15px rgba(255,60,60,.5)}

.panel-title{font-size:11px;opacity:.7}

/* 🔥 LATIDO EN DATOS */
#hora, #dias, #horas{
  animation:latido 1.2s infinite;
  display:inline-block;
}

/* TITULO */
.gvs-title{
  margin-top:60px;
  font-size:40px;
  background:linear-gradient(#fff,#bbb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px rgba(0,150,255,.8);
}

.gvs-line{
  width:300px;height:2px;margin:10px auto;
  background:linear-gradient(90deg,transparent,#00eaff,transparent);
  animation:glowline 2s linear infinite;
}
@keyframes glowline{
  0%{opacity:.2}
  50%{opacity:1}
  100%{opacity:.2}
}

.gvs-sub{font-size:14px;color:#aaa}

/* CONTROLES */
.controles{margin:20px;display:flex;justify-content:center;gap:20px}

/* GRID */
.row,.horarios{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:6px;
}

.container{width:95%;margin:auto}

.carril{
  position:relative;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:6px;
  margin:35px 0;
}

.celda{font-size:13px}

/* HORARIOS */
.horarios span{
  opacity:0;
  font-size:12px;
}

/* SEGMENTOS */
.segmento{
  height:6px;
  background:#222;
  transform:scaleX(0);
  transform-origin:left;
  transition:.4s;
  position:relative;
}

.segmento.activo{
  transform:scaleX(1);
  box-shadow:0 0 10px currentColor;
}

/* ENERGÍA */
.segmento.activo::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent,white,transparent);
  animation:energia 1s linear infinite;
}
@keyframes energia{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

/* PELOTA */
.pelota{
  position:absolute;
  top:50%;
  width:16px;height:16px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:left .2s linear;
  box-shadow:0 0 15px currentColor;
  z-index:10;
}

.pelota::after{
  content:"";
  position:absolute;
  width:30px;height:30px;
  border-radius:50%;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,currentColor,transparent);
  opacity:.3;
}

.campeon{animation:pulse .8s infinite}
@keyframes pulse{
  50%{transform:translate(-50%,-50%) scale(1.4)}
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="panel panel-left">
    <div class="panel-title">HOY</div>
    <div id="fecha"></div>
    <div id="hora"></div>
  </div>

  <div class="panel panel-right">
    <div class="panel-title">TIEMPO RESTANTE</div>
    <div id="dias"></div>
    <div id="horas"></div>
  </div>
</div>

<h1 class="gvs-title">GVS PRODUCCIONES</h1>
<div class="gvs-line"></div>
<div class="gvs-sub">Interactive Experience • Eventos en Vivo</div>

<div class="controles">
<label><input type="checkbox" onclick="toggle(0)">1°</label>
<label><input type="checkbox" onclick="toggle(1)">2°</label>
<label><input type="checkbox" onclick="toggle(2)">3°</label>
</div>

<div class="container">

<div class="row">
<div class="celda">16/6<br>lunes</div>
<div class="celda">22/6<br>domingo</div>
<div class="celda">27/6<br>viernes</div>
<div class="celda">3/7<br>jueves</div>
<div class="celda">7/7<br>lunes</div>
<div class="celda">11/7<br>viernes</div>
<div class="celda">15/7<br>martes</div>
<div class="celda">19/7<br>sábado</div>
</div>

<div class="row">
<div class="celda">Grupos</div>
<div class="celda">Grupos</div>
<div class="celda">Grupos</div>
<div class="celda">16°</div>
<div class="celda">8°</div>
<div class="celda">4°</div>
<div class="celda">Semi</div>
<div class="celda">Final</div>
</div>

<div id="h1" class="horarios"></div>
<div id="h2" class="horarios"></div>
<div id="h3" class="horarios"></div>

<div id="c1" class="carril"></div>
<div id="c2" class="carril"></div>
<div id="c3" class="carril"></div>

</div>

<script>

/* RELOJ */
setInterval(()=>{
  const n=new Date();
  fecha.innerText=n.toLocaleDateString("es-AR");
  hora.innerText=n.toLocaleTimeString("es-AR",{hour:'2-digit',minute:'2-digit'});

  const mundial=new Date("2026-06-11");
  const diff=mundial-n;

  dias.innerText=Math.floor(diff/86400000)+" días";
  horas.innerText=Math.floor((diff/3600000)%24)+" hs";
},1000);

/* CONFIG */
const horarios=[
["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"],
["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"],
["22:00","14:00","23:00","","","","",""]
];

const colores=["#00ff88","#ffd000","#ff3c3c"];
const carriles=["c1","c2","c3"];
const horariosIds=["h1","h2","h3"];

const totalColumnas=8;
const limites=horarios.map(h=>h.filter(x=>x!="").length);

const estados=[false,false,false];
const progreso=[0,0,0];

/* INIT */
function init(){
  carriles.forEach((id,i)=>{
    const c=document.getElementById(id);
    for(let j=0;j<totalColumnas;j++){
      const d=document.createElement("div");
      d.className="segmento";
      c.appendChild(d);
    }

    const h=document.getElementById(horariosIds[i]);
    for(let j=0;j<totalColumnas;j++){
      const s=document.createElement("span");
      s.textContent=horarios[i][j] || "";
      h.appendChild(s);
    }
  });
}
init();

/* POSICION */
function posicionarPelota(i){
  const cont=document.getElementById(carriles[i]);
  const pelota=cont.querySelector(".pelota");
  if(!pelota) return;

  const seg=cont.children;

  let idx = progreso[i]-1;
  if(idx < 0) return;
  if(idx >= limites[i]) idx = limites[i]-1;

  const rect=seg[idx].getBoundingClientRect();
  const contRect=cont.getBoundingClientRect();

  pelota.style.left=(rect.left-contRect.left+rect.width)+"px";
}

/* RESIZE */
window.addEventListener("resize",()=>{
  for(let i=0;i<3;i++){
    if(estados[i]) posicionarPelota(i);
  }
});

function toggle(i){
  estados[i]=!estados[i];
  if(estados[i]) avanzar(i);
  else retroceder(i);
}

function avanzar(i){

  const cont=document.getElementById(carriles[i]);
  cont.querySelectorAll(".pelota").forEach(p=>p.remove());

  const pelota=document.createElement("div");
  pelota.className="pelota";
  pelota.style.background=colores[i];
  cont.appendChild(pelota);

  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){

    if(!estados[i]) return;

    if(progreso[i]>=limites[i]){
      posicionarPelota(i);
      pelota.classList.add("campeon");
      return;
    }

    const idx=progreso[i];

    seg[idx].classList.add("activo");
    seg[idx].style.background=colores[i];

    hrs[idx].style.opacity=1;
    hrs[idx].style.color=colores[i];

    progreso[i]++;
    posicionarPelota(i);

    setTimeout(step,300);
  }

  step();
}

function retroceder(i){

  const cont=document.getElementById(carriles[i]);
  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){

    if(estados[i]) return;

    if(progreso[i]<=0){
      cont.querySelectorAll(".pelota").forEach(p=>p.remove());
      return;
    }

    progreso[i]--;

    seg[progreso[i]].classList.remove("activo");
    hrs[progreso[i]].style.opacity=0;

    setTimeout(step,150);
  }

  step();
}

</script>

</body>
</html>
