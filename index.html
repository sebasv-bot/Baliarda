<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baliarda GVS</title>

<style>
*{box-sizing:border-box;font-family:"Comic Sans MS",cursive!important}
body{margin:0;background:radial-gradient(circle,#0b1f3a,#000);color:#fff;text-align:center}

/* TOP */
.top-bar{
  position:absolute;top:10px;width:100%;
  display:flex;justify-content:space-between;padding:0 30px;
}

.panel{
  padding:10px 14px;border-radius:10px;background:rgba(0,0,0,0.3);
}

.panel-left{
  border:1px solid rgba(0,255,150,.4);
  box-shadow:0 0 10px rgba(0,255,150,.4);
}

.panel-right{
  border:1px solid rgba(255,60,60,.4);
  box-shadow:0 0 10px rgba(255,60,60,.4);
}

.panel-title{font-size:11px;opacity:.7}

/* GVS */
.gvs-title{
  margin-top:60px;font-size:36px;
  background:linear-gradient(#fff,#bbb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 15px rgba(0,150,255,.6);
}

.gvs-line{
  width:300px;height:2px;margin:8px auto;
  background:linear-gradient(90deg,transparent,#00aaff,transparent);
}

.gvs-sub{font-size:14px;color:#aaa}

/* CONTROLES */
.controles{margin:20px;display:flex;justify-content:center;gap:20px}

/* GRID GLOBAL */
.row, .carril, .horarios{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:6px;
}

.container{width:95%;margin:auto}

/* CELDAS */
.celda{
  text-align:center;
  font-size:13px;
}

/* HORARIOS */
.horarios span{
  text-align:center;
  opacity:0;
  font-size:12px;
}

/* CARRILES */
.carril{
  position:relative;
  margin:25px 0;
}

/* SEGMENTOS */
.segmento{
  height:6px;
  background:#333;
  transform:scaleX(0);
  transform-origin:left;
  transition:.3s;
}

.segmento.activo{transform:scaleX(1)}

/* PELOTA */
.pelota{
  position:absolute;
  top:50%;
  width:14px;height:14px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:left .3s linear;
}

/* CAMPEON */
.campeon{animation:pulse 1s infinite}
@keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.4)}}
</style>
</head>

<body>

<div class="top-bar">
  <div class="panel panel-left">
    <div class="panel-title">HOY</div>
    <div id="fecha"></div>
    <div id="hora"></div>
  </div>

  <div class="panel panel-right">
    <div class="panel-title">TIEMPO RESTANTE</div>
    <div id="dias"></div>
    <div id="horas"></div>
  </div>
</div>

<h1 class="gvs-title">GVS PRODUCCIONES</h1>
<div class="gvs-line"></div>
<div class="gvs-sub">Interactive Experience • Eventos en Vivo</div>

<div class="controles">
<label><input type="checkbox" onclick="toggle(0)">1°</label>
<label><input type="checkbox" onclick="toggle(1)">2°</label>
<label><input type="checkbox" onclick="toggle(2)">3°</label>
</div>

<div class="container">

<div class="row">
<div class="celda">16/6<br>lunes</div>
<div class="celda">22/6<br>domingo</div>
<div class="celda">27/6<br>viernes</div>
<div class="celda">3/7<br>jueves</div>
<div class="celda">7/7<br>lunes</div>
<div class="celda">11/7<br>viernes</div>
<div class="celda">15/7<br>martes</div>
<div class="celda">19/7<br>sábado</div>
</div>

<div class="row">
<div class="celda">Grupos</div>
<div class="celda">Grupos</div>
<div class="celda">Grupos</div>
<div class="celda">16°</div>
<div class="celda">8°</div>
<div class="celda">4°</div>
<div class="celda">Semi</div>
<div class="celda">Final</div>
</div>

<div id="h1" class="horarios"></div>
<div id="h2" class="horarios"></div>
<div id="h3" class="horarios"></div>

<div id="c1" class="carril"></div>
<div id="c2" class="carril"></div>
<div id="c3" class="carril"></div>

</div>

<script>

/* RELOJ */
setInterval(()=>{
  const n=new Date();
  fecha.innerText=n.toLocaleDateString("es-AR");
  hora.innerText=n.toLocaleTimeString("es-AR",{hour:'2-digit',minute:'2-digit'});

  const m=new Date("2026-06-11");
  const d=m-n;
  dias.innerText=Math.floor(d/86400000)+" días";
  horas.innerText=Math.floor((d/3600000)%24)+" hs";
},1000);

/* CONFIG */
const horarios=[
["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"],
["22:00","14:00","23:00","19:00","13:00","22:00","16:00","16:00"],
["22:00","14:00","23:00","","","","",""]
];

const colores=["#00ff88","#ffd000","#ff3c3c"];
const carriles=["c1","c2","c3"];
const horariosIds=["h1","h2","h3"];

const totalColumnas = 8;
const limites=horarios.map(h=>h.filter(x=>x!="").length);

/* INIT */
function init(){
  carriles.forEach((id,i)=>{
    const c=document.getElementById(id);
    for(let j=0;j<totalColumnas;j++){
      const d=document.createElement("div");
      d.className="segmento";
      c.appendChild(d);
    }

    const h=document.getElementById(horariosIds[i]);
    for(let j=0;j<totalColumnas;j++){
      const s=document.createElement("span");
      s.textContent=horarios[i][j] || "";
      h.appendChild(s);
    }
  });
}
init();

const estados=[false,false,false];
const progreso=[0,0,0];

function toggle(i){
  estados[i]=!estados[i];
  if(estados[i]) avanzar(i);
  else retroceder(i);
}

function avanzar(i){

  const cont=document.getElementById(carriles[i]);
  cont.querySelectorAll(".pelota").forEach(p=>p.remove());

  const pelota=document.createElement("div");
  pelota.className="pelota";
  pelota.style.background=colores[i];
  cont.appendChild(pelota);

  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){

    if(!estados[i]) return;

    if(progreso[i]>=limites[i]){
      const segmentoFinal = seg[limites[i]-1];
      const rect = segmentoFinal.getBoundingClientRect();
      const contRect = cont.getBoundingClientRect();
      const left = rect.left - contRect.left + rect.width;
      pelota.style.left = left + "px";
      pelota.classList.add("campeon");
      return;
    }

    const idx=progreso[i];

    seg[idx].classList.add("activo");
    seg[idx].style.background=colores[i];

    hrs[idx].style.opacity=1;
    hrs[idx].style.color=colores[i];

    const segmentoActual = seg[idx];
    const rect = segmentoActual.getBoundingClientRect();
    const contRect = cont.getBoundingClientRect();
    const left = rect.left - contRect.left + rect.width;

    pelota.style.left = left + "px";

    progreso[i]++;
    setTimeout(step,300);
  }

  step();
}

function retroceder(i){

  const cont=document.getElementById(carriles[i]);
  const seg=cont.children;
  const hrs=document.getElementById(horariosIds[i]).children;

  function step(){

    if(estados[i]) return;

    if(progreso[i]<=0){
      cont.querySelectorAll(".pelota").forEach(p=>p.remove());
      return;
    }

    progreso[i]--;

    seg[progreso[i]].classList.remove("activo");
    hrs[progreso[i]].style.opacity=0;

    setTimeout(step,150);
  }

  step();
}

</script>

</body>
</html>
